<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>指導予約システム</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F7F6F2;--surface:#FFFFFF;--surface2:#F0EEE8;--border:#E2DFD6;
  --text:#1A1A18;--text2:#6B6860;--text3:#9B9890;
  --accent:#2A5C45;--accent-l:#E8F2EC;--accent-b:#b8dbc6;
  --red:#C84B2F;--red-l:#FAEAE6;--red-b:#f0b9ae;
  --amber:#B8860B;--amber-l:#FDF6E3;--amber-b:#e8d08a;
  --blue:#1a5fa8;--blue-l:#e8f0fb;--blue-b:#b8d0f0;
  --mono:'DM Mono',monospace;--sans:'Noto Sans JP',sans-serif;
  --r:8px;--rl:14px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5;}

/* ── LAYOUT ── */
#app{display:flex;min-height:100vh;}
#sidebar{width:220px;min-width:220px;background:#1a1a18;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;}
#sidebar .s-logo{padding:20px 18px 16px;border-bottom:1px solid #2e2e2c;}
#sidebar .s-logo h1{font-size:14px;font-weight:700;color:#fff;letter-spacing:.04em;}
#sidebar .s-logo p{font-size:11px;color:#777;margin-top:2px;}
#sidebar nav{padding:12px 10px;flex:1;}
#sidebar nav button{width:100%;text-align:left;background:none;border:none;color:#aaa;font-size:13px;font-family:var(--sans);padding:9px 12px;border-radius:var(--r);cursor:pointer;margin-bottom:2px;transition:background .12s,color .12s;display:flex;align-items:center;gap:9px;line-height:1.3;}
#sidebar nav button:hover{background:#2a2a28;color:#fff;}
#sidebar nav button.active{background:var(--accent);color:#fff;}
#sidebar nav button .nav-icon{font-size:15px;flex-shrink:0;}
#sidebar .s-user{padding:12px 18px 16px;border-top:1px solid #2e2e2c;}
#sidebar .s-user p{font-size:11px;color:#777;margin-bottom:3px;}
#sidebar .s-user .s-name{font-size:13px;color:#fff;font-weight:500;display:block;margin-bottom:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#sidebar .s-logout{width:100%;background:none;border:1px solid #3a3a38;color:#aaa;font-size:12px;font-family:var(--sans);padding:6px 10px;border-radius:var(--r);cursor:pointer;transition:all .12s;}
#sidebar .s-logout:hover{border-color:#777;color:#fff;}
#main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;}
#topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:13px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-shrink:0;}
#topbar h2{font-size:17px;font-weight:700;white-space:nowrap;}
#topbar .t-meta{font-size:12px;color:var(--text2);white-space:nowrap;}
#content{flex:1;padding:22px 24px;overflow-y:auto;}

/* ── LOGIN ── */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:20px;}
.lc{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:36px;width:100%;max-width:400px;}
.lc h1{font-size:21px;font-weight:700;margin-bottom:5px;}
.lc .lc-sub{font-size:13px;color:var(--text2);margin-bottom:22px;}
.role-tabs{display:flex;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:20px;}
.role-tabs button{flex:1;padding:8px 6px;border:none;background:transparent;font-size:13px;font-family:var(--sans);cursor:pointer;color:var(--text2);transition:background .12s,color .12s;}
.role-tabs button.active{background:#1a1a18;color:#fff;}

/* ── FORMS ── */
.fg{margin-bottom:14px;}
.fg label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:5px;letter-spacing:.03em;}
.fg input,.fg select,.fg textarea{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:var(--r);font-size:14px;font-family:var(--sans);background:var(--bg);color:var(--text);outline:none;transition:border-color .12s;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--accent);}
.fg textarea{resize:vertical;min-height:64px;}
/* password wrapper */
.pw-wrap{position:relative;display:flex;align-items:center;}
.pw-wrap input{padding-right:38px;}
.pw-eye{position:absolute;right:0;top:0;bottom:0;width:36px;display:flex;align-items:center;justify-content:center;background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px;padding:0;}
.pw-eye:hover{color:var(--text2);}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.err{font-size:12px;color:var(--red);margin-top:6px;min-height:18px;}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;border-radius:var(--r);font-family:var(--sans);cursor:pointer;transition:opacity .12s,background .12s,color .12s,border-color .12s;white-space:nowrap;}
.btn-dark{background:#1a1a18;color:#fff;border:none;padding:10px 18px;font-size:13px;font-weight:500;}
.btn-dark:hover{opacity:.82;}
.btn-dark.full{width:100%;padding:11px;}
.btn-ghost{background:transparent;color:var(--text);border:1px solid var(--border);padding:8px 14px;font-size:13px;}
.btn-ghost:hover{border-color:var(--text);}
.btn-green{background:var(--accent-l);color:var(--accent);border:1px solid var(--accent-b);padding:8px 14px;font-size:13px;}
.btn-green:hover{background:var(--accent);color:#fff;}
.btn-red{background:var(--red-l);color:var(--red);border:1px solid var(--red-b);padding:7px 13px;font-size:13px;}
.btn-red:hover{background:var(--red);color:#fff;}
.btn-sm{padding:5px 10px !important;font-size:12px !important;}

/* ── BADGES ── */
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap;}
.bg-green{background:var(--accent-l);color:var(--accent);}
.bg-red{background:var(--red-l);color:var(--red);}
.bg-amber{background:var(--amber-l);color:var(--amber);}
.bg-gray{background:var(--surface2);color:var(--text2);}
.bg-blue{background:var(--blue-l);color:var(--blue);}

/* ── CARDS / SECTIONS ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;margin-bottom:16px;}
.card-head{padding:13px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.card-head h3{font-size:14px;font-weight:700;}
.card-body{padding:18px;}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:14px 16px;}
.stat .lbl{font-size:11px;color:var(--text2);font-weight:500;letter-spacing:.04em;margin-bottom:4px;}
.stat .val{font-size:24px;font-weight:700;font-family:var(--mono);}
.stat .sub{font-size:11px;color:var(--text3);margin-top:2px;}

/* ── INFO ROWS ── */
.ir{display:flex;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);}
.ir:last-child{border-bottom:none;}
.ir-l{font-size:11px;color:var(--text3);min-width:90px;padding-top:1px;font-weight:500;letter-spacing:.03em;flex-shrink:0;}
.ir-v{font-size:13px;color:var(--text);flex:1;min-width:0;}

/* ── MODAL ── */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:var(--surface);border-radius:var(--rl);width:100%;max-width:500px;max-height:92vh;overflow-y:auto;padding:26px;position:relative;}
.modal h3{font-size:16px;font-weight:700;margin-bottom:3px;padding-right:28px;}
.modal .m-sub{font-size:12px;color:var(--text2);margin-bottom:16px;}
.mc{position:absolute;top:13px;right:14px;background:none;border:none;font-size:18px;cursor:pointer;color:var(--text2);line-height:1;padding:4px;}
.mc:hover{color:var(--text);}
.ma{display:flex;gap:9px;justify-content:flex-end;margin-top:16px;flex-wrap:wrap;}
hr.div{border:none;border-top:1px solid var(--border);margin:14px 0;}

/* ── CALENDAR ── */
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
.cal-nav{display:flex;gap:7px;align-items:center;}
.cal-nav button{background:var(--surface);border:1px solid var(--border);width:30px;height:30px;border-radius:var(--r);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:background .12s;}
.cal-nav button:hover{background:var(--surface2);}
.cal-nav span{font-size:14px;font-weight:700;min-width:130px;text-align:center;}
.tutor-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center;}
.t-tab{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface);font-size:13px;cursor:pointer;transition:all .12s;color:var(--text2);}
.t-tab:hover{border-color:var(--accent);color:var(--accent);}
.t-tab.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.t-info{padding:4px 10px;font-size:11px;background:var(--blue-l);color:var(--blue);border:1px solid var(--blue-b);border-radius:20px;cursor:pointer;white-space:nowrap;}
.t-info:hover{background:var(--blue);color:#fff;}
.cal-grid{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;}
.cg-head{display:grid;grid-template-columns:72px repeat(7,minmax(0,1fr));background:var(--surface2);border-bottom:1px solid var(--border);}
.cg-head>div{padding:9px 4px;text-align:center;font-size:11px;font-weight:500;color:var(--text2);}
.cg-head>div.today{color:var(--accent);font-weight:700;}
.cg-row{display:grid;grid-template-columns:72px repeat(7,minmax(0,1fr));border-bottom:1px solid var(--border);}
.cg-row:last-child{border-bottom:none;}
.cg-time{padding:6px 4px;font-size:10px;color:var(--text3);font-family:var(--mono);display:flex;align-items:center;justify-content:center;border-right:1px solid var(--border);background:var(--surface2);text-align:center;line-height:1.3;}
.cg-cell{padding:4px;display:flex;align-items:center;justify-content:center;border-right:1px solid var(--border);min-height:66px;}
.cg-cell:last-child{border-right:none;}
.sb{width:100%;padding:6px 4px;border-radius:6px;text-align:center;font-size:10px;font-weight:500;line-height:1.35;}
.sb-empty{background:var(--accent-l);color:var(--accent);border:1px solid var(--accent-b);cursor:pointer;}
.sb-empty:hover{background:var(--accent);color:#fff;}
.sb-full{background:var(--red-l);color:var(--red);border:1px solid var(--red-b);}
.sb-mine{background:var(--amber-l);color:var(--amber);border:1px solid var(--amber-b);cursor:pointer;}
.sb-mine:hover{background:#f0e088;}
.sb-past{background:var(--surface2);color:var(--text3);border:1px solid var(--border);}
.sb-off{background:var(--bg);color:var(--text3);border:1px dashed var(--border);font-size:9px;}
.sb-partial{background:#fff8e8;color:var(--amber);border:1px solid var(--amber-b);cursor:pointer;}
.sb-partial:hover{background:var(--amber);color:#fff;}
.legend{display:flex;gap:12px;flex-wrap:wrap;font-size:12px;color:var(--text2);margin-top:10px;align-items:center;}

/* ── TABLE ── */
.tbl{width:100%;border-collapse:collapse;font-size:13px;}
.tbl th{text-align:left;padding:9px 12px;font-size:11px;font-weight:500;color:var(--text2);letter-spacing:.04em;border-bottom:1px solid var(--border);background:var(--surface2);white-space:nowrap;}
.tbl td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:top;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:var(--surface2);}

/* ── SEARCH ── */
.sbar{display:flex;gap:10px;flex-wrap:wrap;background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:16px;margin-bottom:16px;align-items:flex-end;}
.sbar .fg{margin-bottom:0;flex:1;min-width:140px;}
.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:13px;}
.tc{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:16px;}
.tc:hover{box-shadow:0 2px 10px rgba(0,0,0,.07);}
.tc h4{font-size:14px;font-weight:700;margin-bottom:7px;}
.stags{display:flex;flex-wrap:wrap;gap:5px;margin:7px 0;}
.stag{padding:2px 8px;background:var(--accent-l);color:var(--accent);border-radius:12px;font-size:11px;font-weight:500;}
.stag.hl{background:var(--accent);color:#fff;}

/* ── CHIP ── */
.chips{display:flex;flex-wrap:wrap;gap:5px;padding:8px;border:1px solid var(--border);border-radius:var(--r);background:var(--bg);}
.chip{padding:3px 9px;border-radius:20px;font-size:12px;border:1px solid var(--border);cursor:pointer;background:var(--surface);transition:all .12s;}
.chip.on{background:var(--accent);color:#fff;border-color:var(--accent);}

/* ── SHIFT ── */
.shift-day{padding:8px 5px;text-align:center;border:1px solid var(--border);border-radius:var(--r);cursor:pointer;transition:all .12s;background:var(--surface);user-select:none;}
.shift-day:hover{border-color:var(--accent);}
.shift-day.working{background:var(--accent-l);border-color:var(--accent-b);}
.shift-day .wd{font-size:10px;color:var(--text3);margin-bottom:1px;}
.shift-day .dd{font-size:15px;font-weight:700;}
.shift-day .sh{font-size:10px;margin-top:3px;color:var(--text2);line-height:1.3;}
.shift-day.working .wd,.shift-day.working .sh{color:var(--accent);}
.shift-time-select{font-size:11px;font-family:var(--sans);border:1px solid var(--border);border-radius:4px;padding:2px 4px;background:var(--bg);color:var(--text);cursor:pointer;width:100%;margin-top:3px;}

/* ── RESPONSIVE ── */
@media(max-width:800px){
  #sidebar{width:54px;min-width:54px;}
  #sidebar .s-logo p,#sidebar nav button span,#sidebar .s-user .s-name,#sidebar .s-user p,#sidebar .s-logout{display:none;}
  #sidebar .s-logo h1{font-size:9px;}
  #sidebar nav button{justify-content:center;padding:10px 4px;}
  .stats{grid-template-columns:1fr 1fr;}
  .fr{grid-template-columns:1fr;}
  #content{padding:14px 12px;}
  #topbar{padding:11px 14px;}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="lc">
    <h1>📚 指導予約システム</h1>
    <p class="lc-sub">ロールを選択してログインしてください</p>
    <div class="role-tabs" id="role-tabs">
      <button class="active" onclick="setRole('student')">生徒</button>
      <button onclick="setRole('tutor')">指導者</button>
      <button onclick="setRole('admin')">管理者</button>
    </div>
    <div class="fg">
      <label>ユーザーID</label>
      <input type="text" id="l-id" placeholder="ユーザーIDを入力" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <div class="fg" id="l-pw-wrap" style="display:none">
      <label>パスワード</label>
      <div class="pw-wrap">
        <input type="password" id="l-pw" placeholder="パスワードを入力" onkeydown="if(event.key==='Enter')doLogin()"/>
        <button class="pw-eye" type="button" onclick="togglePw('l-pw',this)" title="表示/非表示">👁</button>
      </div>
    </div>
    <div class="err" id="l-err"></div>
    <button class="btn btn-dark full" style="margin-top:6px" onclick="doLogin()">ログイン</button>
    <p style="font-size:11px;color:var(--text3);margin-top:11px;text-align:center">生徒はパスワード不要 ／ 指導者・管理者はパスワード必須</p>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <div id="sidebar">
    <div class="s-logo"><h1>📚 予約システム</h1><p>Tutoring Scheduler</p></div>
    <nav id="snav"></nav>
    <div class="s-user">
      <p>ログイン中</p>
      <span class="s-name" id="s-uname"></span>
      <button class="s-logout" onclick="doLogout()">ログアウト</button>
    </div>
  </div>
  <div id="main">
    <div id="topbar">
      <h2 id="t-title">カレンダー</h2>
      <div class="t-meta" id="t-meta"></div>
    </div>
    <div id="content"></div>
  </div>
</div>

<!-- MODAL -->
<div class="ov" id="ov" style="display:none" onclick="ovClose(event)">
  <div class="modal" id="modal"></div>
</div>

<script>
// ═══════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════
const WEEKDAYS = ['日','月','火','水','木','金','土'];
const ALL_SUBJ  = ['数学','英語','国語','現代文','古文','漢文','物理','化学','生物','地学','日本史','世界史','地理','政治経済','情報','小論文','その他'];

// Slot time options shown to student/tutor
const SLOT_OPTIONS = [
  { key:'off',   label:'休み' },
  { key:'am',    label:'午前のみ', slots:[0,1] },   // ①②
  { key:'pm',    label:'午後のみ', slots:[2,3] },   // ③④
  { key:'full',  label:'全日',    slots:[0,1,2,3] },
  { key:'late',  label:'遅刻出勤', slots:[1,2,3] }, // ②③④
  { key:'early', label:'早退',    slots:[0,1,2] },  // ①②③
];
const SLOT_LABELS = ['① 9:00–10:30','② 11:00–12:30','③ 14:00–15:30','④ 16:00–17:30'];
const SLOT_SHORT  = ['①9:00','②11:00','③14:00','④16:00'];

const ADMIN = { id:'admin', name:'管理者', pw:'admin', role:'admin' };

let students = {
  s001:{ id:'s001', name:'田中 花子', role:'student' },
  s002:{ id:'s002', name:'鈴木 太郎', role:'student' },
  s003:{ id:'s003', name:'山田 美咲', role:'student' },
};
let tutors = {
  t001:{ id:'t001', name:'佐藤 先生', pw:'tutor123', subjects:['数学','物理','化学'], bio:'理系全般が得意です。' },
  t002:{ id:'t002', name:'伊藤 先生', pw:'tutor456', subjects:['英語','国語','現代文','古文'], bio:'語学・文系専門です。' },
};
// shifts[tutorId][dateStr] = slotOptionKey e.g. 'full' | 'am' | 'off' | undefined
let shifts = { t001:{}, t002:{} };

// Build sample shifts
(function(){
  ['t001','t002'].forEach((tid,ti)=>{
    for(let i=0;i<21;i++){
      const d=new Date(); d.setDate(d.getDate()+i);
      if(d.getDay()===0||d.getDay()===6) continue;
      const ds=d.toISOString().slice(0,10);
      const opts=['full','full','am','pm','full','late'];
      shifts[tid][ds]=opts[(d.getDay()+ti*2)%opts.length];
    }
  });
})();

let reservations = [
  {id:1,date:dStr(1),slot:0,studentId:'s002',tutorId:'t001',subject:'数学',range:'二次方程式',purpose:'定期テスト対策',concurrent:'なし'},
  {id:2,date:dStr(2),slot:2,studentId:'s001',tutorId:'t002',subject:'英語',range:'仮定法過去',purpose:'受験準備',concurrent:'なし'},
];
let cancelled=[];
let loginLogs=[];
let nid=20;
let CU=null; // currentUser
let WO=0;    // weekOffset
let calTutor=null;

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
function dStr(n){const d=new Date();d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);}
function pDate(s){return new Date(s+'T00:00:00');}
function fDate(s){const d=pDate(s);return `${d.getMonth()+1}/${d.getDate()}`;}
function fDT(iso){const d=new Date(iso);return `${d.getFullYear()}/${z(d.getMonth()+1)}/${z(d.getDate())} ${z(d.getHours())}:${z(d.getMinutes())}`;}
function z(n){return String(n).padStart(2,'0');}
function today(){return new Date().toISOString().slice(0,10);}
function wkDates(off){
  const t=new Date();t.setHours(0,0,0,0);
  const m=new Date(t);m.setDate(t.getDate()-t.getDay()+1+off*7);
  return Array.from({length:7},(_,i)=>{const d=new Date(m);d.setDate(m.getDate()+i);return d;});
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function slotActive(tutorId,dateS,slotIdx){
  const key=shifts[tutorId]&&shifts[tutorId][dateS];
  if(!key||key==='off') return false;
  const opt=SLOT_OPTIONS.find(o=>o.key===key);
  return opt && opt.slots && opt.slots.includes(slotIdx);
}
function slotLabel(tutorId,dateS){
  const key=shifts[tutorId]&&shifts[tutorId][dateS];
  const opt=SLOT_OPTIONS.find(o=>o.key===key);
  return opt?opt.label:'休み';
}
function getRes(date,slot,tid){return reservations.find(r=>r.date===date&&r.slot===slot&&r.tutorId===tid)||null;}

function togglePw(inputId,btn){
  const inp=document.getElementById(inputId);
  if(!inp) return;
  if(inp.type==='password'){inp.type='text';btn.textContent='🔒';}
  else{inp.type='password';btn.textContent='👁';}
}
function pwField(id,placeholder,onenter){
  return `<div class="pw-wrap"><input type="password" id="${id}" placeholder="${placeholder}" ${onenter?`onkeydown="if(event.key==='Enter')${onenter}"`:''}/><button class="pw-eye" type="button" onclick="togglePw('${id}',this)" title="表示切替">👁</button></div>`;
}

// LOGIN
// ═══════════════════════════════════════════
let loginRole='student';
function setRole(r){
  loginRole=r;
  document.querySelectorAll('#role-tabs button').forEach((b,i)=>b.classList.toggle('active',['student','tutor','admin'][i]===r));
  document.getElementById('l-pw-wrap').style.display=r!=='student'?'block':'none';
  document.getElementById('l-err').textContent='';
}
function doLogin(){
  const id=document.getElementById('l-id').value.trim();
  const pw=document.getElementById('l-pw').value;
  let user=null;
  if(loginRole==='admin'){
    if(id===ADMIN.id&&pw===ADMIN.pw) user={...ADMIN};
    else{document.getElementById('l-err').textContent='IDまたはパスワードが違います';return;}
  } else if(loginRole==='tutor'){
    const t=tutors[id];
    if(!t){document.getElementById('l-err').textContent='指導者IDが見つかりません';return;}
    if(t.pw!==pw){document.getElementById('l-err').textContent='パスワードが違います';return;}
    user={...t,role:'tutor'};
  } else {
    const s=students[id];
    if(!s){document.getElementById('l-err').textContent='生徒IDが見つかりません';return;}
    user={...s};
  }
  CU=user;
  loginLogs.unshift({userId:id,name:user.name,role:{student:'生徒',tutor:'指導者',admin:'管理者'}[user.role||'student'],loginAt:new Date().toISOString()});
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('s-uname').textContent=user.name;
  buildSidebar();
  calTutor=user.role==='tutor'?user.id:(Object.keys(tutors)[0]||null);
  const first={student:'calendar',tutor:'tutor-cal',admin:'all-res'}[user.role||'student'];
  showPage(first);
}
function doLogout(){
  CU=null;WO=0;
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('l-id').value='';
  document.getElementById('l-pw').value='';
  document.getElementById('l-err').textContent='';
  setRole('student');
}

function pgCalendar(C){
  const dates=wkDates(WO);
  const ts=today();

  if(!tList.length){C.innerHTML='<p style="color:var(--text2);padding:20px">指導者が登録されていません</p>';return;}
  if(!calTutor||!tutors[calTutor]) calTutor=tList[0].id;
  const wl=`${dates[0].getMonth()+1}/${dates[0].getDate()} 〜 ${dates[6].getMonth()+1}/${dates[6].getDate()}`;
  let h=`
  <div class="cal-head">
    <div class="cal-nav">
      <button onclick="wkNav(-1)">&#8249;</button>
      <span>${wl}</span>
      <button onclick="wkNav(1)">&#8250;</button>
    </div>
    <button class="btn btn-ghost" style="padding:7px 12px;font-size:12px" onclick="wkNav(0,1)">今週</button>
  </div>
  <div class="tutor-tabs">
    ${tList.map(t=>`<button class="t-tab ${t.id===calTutor?'active':''}" onclick="swTutor('${t.id}')">${esc(t.name)}</button>
      <button class="t-info" onclick="tutorInfoModal('${t.id}')">科目確認</button>`).join('<span style="display:inline-block;width:6px"></span>')}
  </div>
  <div class="cal-grid">
    <div class="cg-head">
      <div>コマ</div>
      ${dates.map(d=>{const ds=d.toISOString().slice(0,10);const it=ds===ts;const wk=slotLabel(calTutor,ds);
        return `<div class="${it?'today':''}"><div>${WEEKDAYS[d.getDay()]}</div><div style="font-size:16px;font-weight:700">${d.getDate()}</div><div style="font-size:9px;margin-top:1px;color:${wk==='休み'?'var(--text3)':'var(--accent)'}">${wk}</div></div>`;
      }).join('')}
    </div>
    ${Array.from({length:4},(_,si)=>`
    <div class="cg-row">
      <div class="cg-time">${SLOT_SHORT[si]}</div>
      ${dates.map(d=>{
        const ds=d.toISOString().slice(0,10);
        const past=d<new Date(new Date().setHours(0,0,0,0));
        const active=slotActive(calTutor,ds,si);
        const res=getRes(ds,si,calTutor);
        let b='';
        if(!active){
          b=`<div class="sb sb-off">勤務外</div>`;
        } else if(past){
          b=res?`<div class="sb sb-past">済<br>${esc(res.subject)}</div>`:`<div class="sb sb-past">終了</div>`;
        } else if(!res){
          b=`<div class="sb sb-empty" onclick="modalBook('${ds}',${si},'${calTutor}')">空<br>予約する</div>`;
        } else if(res.studentId===CU.id){
          b=`<div class="sb sb-mine" onclick="modalMySlot(${res.id})">予約済<br>${esc(res.subject)}</div>`;
        } else {
          b=`<div class="sb sb-full">満</div>`;
        }
        return `<div class="cg-cell">${b}</div>`;
      }).join('')}
    </div>`).join('')}
  </div>

    <span><span class="badge bg-green">空</span> 予約可</span>
    <span><span class="badge bg-red">満</span> 予約済</span>

    <span><span class="badge bg-gray">終了</span> 過去</span>
    <span style="font-size:11px;padding:2px 8px;background:var(--bg);border:1px dashed var(--border);border-radius:20px;color:var(--text3)">勤務外</span>
  </div>`;
  C.innerHTML=h;
}

function doBook(date,si,tid){

    range,purpose:document.getElementById('bk-p').value,

function doEdit(id){
  const res=reservations.find(r=>r.id===id);if(!res)return;
  const range=document.getElementById('ed-r').value.trim();
  if(!range){document.getElementById('ed-e').textContent='範囲を入力してください';return;}
  res.subject=document.getElementById('ed-s').value;
  res.purpose=document.getElementById('ed-p').value;
  res.range=range;
  res.concurrent=document.getElementById('ed-c').value||'なし';
  closeModal();showPage('my-res');
}
function doCancel(id){
  const reason=document.getElementById('ed-cr').value.trim();
  if(!reason){document.getElementById('ed-e').textContent='キャンセル理由を入力してください';return;}
  const i=reservations.findIndex(r=>r.id===id);
  if(i!==-1){const res=reservations.splice(i,1)[0];cancelled.push({...res,cancelReason:reason,cancelledAt:new Date().toISOString()});}
  closeModal();pgCalendar(document.getElementById('content'));
}

function pgFindTutor(C){
  C.innerHTML=`
  <div class="sbar">
    <div class="fg"><label>受講したい日</label><input type="date" id="fd-date" min="${today()}"/></div>
    <div class="fg" style="flex:2;min-width:200px"><label>科目（複数可）</label>
      <div class="chips" id="fd-chips">${ALL_SUBJ.map(s=>`<span class="chip" onclick="this.classList.toggle('on')">${esc(s)}</span>`).join('')}</div>
    </div>
    <button class="btn btn-green" onclick="doFind()">絞り込み</button>
  </div>
  <div id="fd-results" class="tgrid">${renderTutorCards(Object.values(tutors),null,[])}</div>`;
}
function doFind(){
  const date=document.getElementById('fd-date').value;
  const subs=[...document.querySelectorAll('#fd-chips .chip.on')].map(c=>c.textContent);
  let list=Object.values(tutors);
  if(date){list=list.filter(t=>{const k=shifts[t.id]&&shifts[t.id][date];return k&&k!=='off';});}
  if(subs.length) list=list.filter(t=>subs.some(s=>t.subjects.includes(s)));
  document.getElementById('fd-results').innerHTML=renderTutorCards(list,date,subs);
}
function renderTutorCards(list,date,subs){
  if(!list.length) return '<p style="color:var(--text2);padding:20px">条件に合う指導者が見つかりませんでした</p>';
  return list.map(t=>{
    const freeSlots=date?Array.from({length:4},(_,i)=>i).filter(i=>slotActive(t.id,date,i)&&!getRes(date,i,t.id)):null;
    const shiftInfo=date?`<div style="margin-top:8px;font-size:12px;color:var(--text2)">${fDate(date)} 勤務：<span class="badge bg-blue">${slotLabel(t.id,date)}</span></div>
    <div style="margin-top:5px;font-size:12px;color:var(--text2)">空きコマ：${freeSlots&&freeSlots.length?freeSlots.map(i=>`<span class="badge bg-green" style="margin:1px">${SLOT_SHORT[i]}</span>`).join(''):'<span class="badge bg-gray">なし</span>'}</div>`:'';
    return `<div class="tc">
      <h4>${esc(t.name)}</h4>
      <div class="stags">${t.subjects.map(s=>`<span class="stag ${subs.includes(s)?'hl':''}">${esc(s)}</span>`).join('')}</div>
      <p style="font-size:12px;color:var(--text2)">${esc(t.bio||'')}</p>
      ${shiftInfo}
      <div style="margin-top:12px"><button class="btn btn-green btn-sm" onclick="swTutor('${t.id}');showPage('calendar')">カレンダーで予約する →</button></div>
    </div>`;
  }).join('');
}

function modalTutorSlot(id){
  const res=reservations.find(r=>r.id===id);if(!res)return;
  const d=pDate(res.date);
  const label=`${d.getMonth()+1}/${d.getDate()}（${WEEKDAYS[d.getDay()]}） ${SLOT_LABELS[res.slot]}`;
  showModal(`<button class="mc" onclick="closeModal()">×</button>
    <h3>予約詳細</h3><p class="m-sub">${label}</p>
    <div class="ir"><span class="ir-l">生徒番号</span><span class="ir-v" style="font-family:var(--mono)">${esc(res.studentId)}</span></div>
    <div class="ir"><span class="ir-l">科目</span><span class="ir-v"><span class="badge bg-green">${esc(res.subject)}</span></span></div>
    <div class="ir"><span class="ir-l">範囲・内容</span><span class="ir-v">${esc(res.range)}</span></div>
    <div class="ir"><span class="ir-l">目的</span><span class="ir-v">${esc(res.purpose)}</span></div>
    <div class="ir"><span class="ir-l">同時受講者</span><span class="ir-v">${esc(res.concurrent)}</span></div>
    <div class="ma"><button class="btn btn-dark" onclick="closeModal()">閉じる</button></div>`);
}

function pgTutorRes(C){
  const tid=CU.id;
  const list=reservations.filter(r=>r.tutorId===tid).sort((a,b)=>a.date.localeCompare(b.date)||a.slot-b.slot);
  const canc=cancelled.filter(r=>r.tutorId===tid);
  const thisWk=wkDates(0).map(d=>d.toISOString().slice(0,10));
  C.innerHTML=`
  <div class="stats" style="grid-template-columns:1fr 1fr">
    <div class="stat"><div class="lbl">全予約数</div><div class="val">${list.length}</div></div>
    <div class="stat"><div class="lbl">今週</div><div class="val">${list.filter(r=>thisWk.includes(r.date)).length}</div></div>
  </div>
  <div class="card">
    <div class="card-head"><h3>予約一覧</h3></div>
    ${list.length===0?'<div class="card-body" style="color:var(--text2)">予約なし</div>':`
    <div style="overflow-x:auto"><table class="tbl"><thead><tr><th>日付</th><th>コマ</th><th>生徒番号</th><th>科目</th><th>範囲・内容</th><th>目的</th><th>同時受講</th></tr></thead>
    <tbody>${list.map(r=>{const d=pDate(r.date);return `<tr>
      <td style="white-space:nowrap">${d.getMonth()+1}/${d.getDate()}（${WEEKDAYS[d.getDay()]}）</td>
      <td><span class="badge bg-amber">${SLOT_SHORT[r.slot]}</span></td>
      <td style="font-family:var(--mono)">${esc(r.studentId)}</td>
      <td><span class="badge bg-green">${esc(r.subject)}</span></td>
      <td>${esc(r.range)}</td><td>${esc(r.purpose)}</td><td>${esc(r.concurrent)}</td></tr>`;}).join('')}
    </tbody></table></div>`}
  </div>
  <div class="card">
    <div class="card-head"><h3>キャンセル履歴（${canc.length}件）</h3></div>
    ${canc.length===0?'<div class="card-body" style="color:var(--text2)">記録なし</div>':`
    <div style="overflow-x:auto"><table class="tbl"><thead><tr><th>日付</th><th>コマ</th><th>生徒番号</th><th>科目</th><th>理由</th></tr></thead>
    <tbody>${canc.map(r=>{const d=pDate(r.date);return `<tr>
      <td style="white-space:nowrap">${d.getMonth()+1}/${d.getDate()}（${WEEKDAYS[d.getDay()]}）</td>
      <td>${SLOT_SHORT[r.slot]}</td><td style="font-family:var(--mono)">${esc(r.studentId)}</td>
      <td>${esc(r.subject)}</td><td style="color:var(--red)">${esc(r.cancelReason)}</td></tr>`;}).join('')}
    </tbody></table></div>`}
  </div>`;
}

    <div style="overflow-x:auto"><table class="tbl"><thead><tr><th>日付</th><th>コマ</th><th>生徒</th><th>指導者</th><th>科目</th><th>理由</th><th>取消日時</th></tr></thead>
    <tbody>${cancelled.length===0?`<tr><td colspan="7" style="text-align:center;color:var(--text2);padding:20px">記録なし</td></tr>`:cancelled.map(r=>{
      const d=pDate(r.date);const st=students[r.studentId];const t=tutors[r.tutorId];

// PAGE: ADMIN – MANAGE TUTORS

function pgMgrTutors(C){
  const list=Object.values(tutors);
  C.innerHTML=`
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px">
    <h3 style="font-size:15px;font-weight:700">指導者一覧（${list.length}名）</h3>
    <button class="btn btn-green" onclick="modalAddTutor()">＋ 指導者を追加</button>
  </div>
  <div class="card">
    <div style="overflow-x:auto"><table class="tbl"><thead><tr><th>ID</th><th>名前</th><th>指導可能科目</th><th>一言</th><th>操作</th></tr></thead>
    <tbody>${list.length===0?`<tr><td colspan="5" style="text-align:center;color:var(--text2);padding:20px">登録なし</td></tr>`:list.map(t=>`<tr>
      <td style="font-family:var(--mono);white-space:nowrap">${esc(t.id)}</td>
      <td style="font-weight:500;white-space:nowrap">${esc(t.name)}</td>
      <td><div class="stags">${t.subjects.map(s=>`<span class="stag">${esc(s)}</span>`).join('')}</div></td>
      <td style="font-size:12px;color:var(--text2)">${esc(t.bio||'—')}</td>
      <td style="white-space:nowrap;display:flex;gap:6px">
        <button class="btn btn-ghost btn-sm" onclick="modalEditTutor('${t.id}')">編集</button>
        <button class="btn btn-red btn-sm" onclick="delTutor('${t.id}')">削除</button>
      </td></tr>`).join('')}
    </tbody></table></div>
  </div>`;
}
function modalAddTutor(){
  showModal(`<button class="mc" onclick="closeModal()">×</button>
    <h3>指導者を追加</h3><p class="m-sub">新しい指導者情報を入力してください</p>
    <div class="fr">
      <div class="fg"><label>ユーザーID（英数字）</label><input type="text" id="at-id" placeholder="tutor03"/></div>
      <div class="fg"><label>名前</label><input type="text" id="at-nm" placeholder="山本 先生"/></div>
    </div>
    <div class="fg"><label>パスワード</label>${pwField('at-pw','パスワードを設定')}</div>
    <div class="fg"><label>指導可能科目（複数選択可）</label><div class="chips" id="at-chips">${ALL_SUBJ.map(s=>`<span class="chip" onclick="this.classList.toggle('on')">${esc(s)}</span>`).join('')}</div></div>
    <div class="fg"><label>一言・自己紹介</label><input type="text" id="at-bio" placeholder="得意科目や一言"/></div>
    <div class="err" id="at-e"></div>
    <div class="ma">
      <button class="btn btn-ghost" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-dark" onclick="doAddTutor()">追加</button>
    </div>`);
}
function doAddTutor(){
  const id=document.getElementById('at-id').value.trim();
  const nm=document.getElementById('at-nm').value.trim();
  const pw=document.getElementById('at-pw').value;
  const bio=document.getElementById('at-bio').value.trim();
  const subs=[...document.querySelectorAll('#at-chips .chip.on')].map(c=>c.textContent);
  if(!id||!nm||!pw){document.getElementById('at-e').textContent='ID・名前・パスワードは必須です';return;}
  if(tutors[id]||id===ADMIN.id){document.getElementById('at-e').textContent='このIDはすでに使われています';return;}
  if(!subs.length){document.getElementById('at-e').textContent='科目を1つ以上選んでください';return;}
  tutors[id]={id,name:nm,pw,subjects:subs,bio};
  shifts[id]={};
  closeModal();pgMgrTutors(document.getElementById('content'));
}
function modalEditTutor(tid){
  const t=tutors[tid];if(!t)return;
  showModal(`<button class="mc" onclick="closeModal()">×</button>
    <h3>指導者を編集</h3><p class="m-sub">ID: ${esc(tid)}</p>
    <div class="fg"><label>名前</label><input type="text" id="et-nm" value="${esc(t.name)}"/></div>
    <div class="fg"><label>新しいパスワード（変更する場合のみ）</label>${pwField('et-pw','空欄で変更しない')}</div>
    <div class="fg"><label>指導可能科目</label><div class="chips" id="et-chips">${ALL_SUBJ.map(s=>`<span class="chip ${t.subjects.includes(s)?'on':''}" onclick="this.classList.toggle('on')">${esc(s)}</span>`).join('')}</div></div>
    <div class="fg"><label>一言・自己紹介</label><input type="text" id="et-bio" value="${esc(t.bio||'')}"/></div>
    <div class="err" id="et-e"></div>
    <div class="ma">
      <button class="btn btn-ghost" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-dark" onclick="doEditTutor('${tid}')">保存</button>
    </div>`);
}
function doEditTutor(tid){
  const t=tutors[tid];if(!t)return;
  const nm=document.getElementById('et-nm').value.trim();
  const pw=document.getElementById('et-pw').value;
  const subs=[...document.querySelectorAll('#et-chips .chip.on')].map(c=>c.textContent);
  if(!nm){document.getElementById('et-e').textContent='名前は必須です';return;}
  if(!subs.length){document.getElementById('et-e').textContent='科目を1つ以上選んでください';return;}
  t.name=nm;t.bio=document.getElementById('et-bio').value.trim();t.subjects=subs;
  if(pw) t.pw=pw;
  closeModal();pgMgrTutors(document.getElementById('content'));
}
function delTutor(tid){
  if(!confirm(`「${tutors[tid]?.name}」を削除しますか？`))return;
  delete tutors[tid];delete shifts[tid];
  if(calTutor===tid) calTutor=Object.keys(tutors)[0]||null;
  pgMgrTutors(document.getElementById('content'));
}

// ═══════════════════════════════════════════
// PAGE: ADMIN – SHIFT MANAGEMENT
// ═══════════════════════════════════════════
function pgMgrShifts(C){
  const dates=wkDates(WO);
  const wl=`${dates[0].getMonth()+1}/${dates[0].getDate()} 〜 ${dates[6].getMonth()+1}/${dates[6].getDate()}`;
  const tList=Object.values(tutors);
  let h=`
  <div class="cal-head">
    <div class="cal-nav">
      <button onclick="shWk(-1)">&#8249;</button>
      <span>${wl}</span>
      <button onclick="shWk(1)">&#8250;</button>
    </div>
    <button class="btn btn-ghost" style="padding:7px 12px;font-size:12px" onclick="shWk(0,1)">今週</button>
  </div>
  <p style="font-size:12px;color:var(--text2);margin-bottom:14px">各日のセレクトで勤務パターンを選択してください</p>`;
  if(!tList.length){h+='<p style="color:var(--text2)">指導者が登録されていません</p>';C.innerHTML=h;return;}
  tList.forEach(t=>{
    const wkCount=Object.values(shifts[t.id]||{}).filter(v=>v&&v!=='off').length;
    h+=`<div class="card" style="margin-bottom:14px">
      <div class="card-head">
        <h3>${esc(t.name)}</h3>
        <span style="font-size:12px;color:var(--text2)">設定済み出勤日: ${wkCount}日</span>
      </div>
      <div style="padding:14px;overflow-x:auto">
        <div style="display:grid;grid-template-columns:repeat(7,minmax(80px,1fr));gap:6px;min-width:560px">
          ${dates.map(d=>{
            const ds=d.toISOString().slice(0,10);
            const key=(shifts[t.id]&&shifts[t.id][ds])||'off';
            const isOn=key!=='off';
            const opt=SLOT_OPTIONS.find(o=>o.key===key)||SLOT_OPTIONS[0];
            return `<div class="shift-day ${isOn?'working':''}" id="sd-${t.id}-${ds}">
              <div class="wd">${WEEKDAYS[d.getDay()]} ${d.getDate()}</div>
              <select class="shift-time-select" onchange="setShift('${t.id}','${ds}',this.value,this.closest('.shift-day'))">
                ${SLOT_OPTIONS.map(o=>`<option value="${o.key}" ${o.key===key?'selected':''}>${o.label}</option>`).join('')}
              </select>
              <div class="sh" id="sh-lbl-${t.id}-${ds}">${opt.label}</div>
            </div>`;
          }).join('')}
        </div>
      </div>
    </div>`;
  });
  C.innerHTML=h;
}
function setShift(tid,ds,val,cellEl){
  if(!shifts[tid]) shifts[tid]={};
  shifts[tid][ds]=val;
  const isOn=val!=='off';
  cellEl.classList.toggle('working',isOn);
  const lbl=document.getElementById(`sh-lbl-${tid}-${ds}`);
  if(lbl){const opt=SLOT_OPTIONS.find(o=>o.key===val);lbl.textContent=opt?opt.label:'—';}
  // update count
  const card=cellEl.closest('.card');
  if(card){
    const cnt=Object.values(shifts[tid]).filter(v=>v&&v!=='off').length;
    const sp=card.querySelector('.card-head span');
    if(sp) sp.textContent=`設定済み出勤日: ${cnt}日`;
  }
}
function shWk(d,reset){if(reset)WO=0;else WO+=d;pgMgrShifts(document.getElementById('content'));}

      <td style="font-family:var(--mono);font-size:12px;white-space:nowrap">${fDT(l.loginAt)}</td>
      <td style="font-family:var(--mono)">${esc(l.userId)}</td>
      <td>${esc(l.name)}</td>
      <td><span class="badge ${l.role==='管理者'?'bg-red':l.role==='指導者'?'bg-green':'bg-gray'}">${l.role}</span></td>

    </tbody></table></div>

}
