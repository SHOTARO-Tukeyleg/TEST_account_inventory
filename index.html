<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>指導予約システム</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F7F6F2;--sf:#fff;--sf2:#F0EEE8;--bd:#E2DFD6;
  --tx:#1A1A18;--tx2:#6B6860;--tx3:#9B9890;
  --gr:#2A5C45;--gr-l:#E8F2EC;--gr-b:#b8dbc6;
  --rd:#C84B2F;--rd-l:#FAEAE6;--rd-b:#f0b9ae;
  --am:#B8860B;--am-l:#FDF6E3;--am-b:#e8d08a;
  --bl:#1a5fa8;--bl-l:#e8f0fb;--bl-b:#b8d0f0;
  --pu:#6b3fa0;--pu-l:#f3eefa;--pu-b:#d4b8f0;
  --mn:'DM Mono',monospace;--sn:'Noto Sans JP',sans-serif;
  --r:8px;--rl:14px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--sn);background:var(--bg);color:var(--tx);min-height:100vh;font-size:14px;line-height:1.5;}

/* LAYOUT */
#app{display:flex;min-height:100vh;}
#sb{width:220px;min-width:220px;background:#1a1a18;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;flex-shrink:0;}
#sb .logo{padding:18px 18px 14px;border-bottom:1px solid #2e2e2c;}
#sb .logo h1{font-size:14px;font-weight:700;color:#fff;letter-spacing:.04em;}
#sb .logo p{font-size:11px;color:#777;margin-top:2px;}
#sb nav{padding:10px 10px;flex:1;}
#sb nav button{width:100%;text-align:left;background:none;border:none;color:#aaa;font-size:13px;font-family:var(--sn);padding:8px 12px;border-radius:var(--r);cursor:pointer;margin-bottom:2px;transition:background .12s,color .12s;display:flex;align-items:center;gap:9px;}
#sb nav button:hover{background:#2a2a28;color:#fff;}
#sb nav button.active{background:var(--gr);color:#fff;}
#sb .su{padding:12px 16px 14px;border-top:1px solid #2e2e2c;}
#sb .su p{font-size:11px;color:#777;margin-bottom:2px;}
#sb .su .sn{font-size:13px;color:#fff;font-weight:500;display:block;margin-bottom:7px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
#sb .sl{width:100%;background:none;border:1px solid #3a3a38;color:#aaa;font-size:12px;font-family:var(--sn);padding:6px 10px;border-radius:var(--r);cursor:pointer;}
#sb .sl:hover{border-color:#777;color:#fff;}
#main{flex:1;display:flex;flex-direction:column;min-width:0;}
#topbar{background:var(--sf);border-bottom:1px solid var(--bd);padding:13px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-shrink:0;}
#topbar h2{font-size:17px;font-weight:700;}
#topbar .tm{font-size:12px;color:var(--tx2);}
#ct{flex:1;padding:22px 24px;overflow-y:auto;}

/* LOGIN */
#ls{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:20px;}
.lc{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);padding:36px;width:100%;max-width:400px;}
.lc h1{font-size:21px;font-weight:700;margin-bottom:5px;}
.lc-sub{font-size:13px;color:var(--tx2);margin-bottom:20px;}
.rtabs{display:flex;border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;margin-bottom:18px;}
.rtabs button{flex:1;padding:8px;border:none;background:transparent;font-size:13px;font-family:var(--sn);cursor:pointer;color:var(--tx2);transition:background .12s,color .12s;}
.rtabs button.on{background:#1a1a18;color:#fff;}

/* FORMS */
.fg{margin-bottom:13px;}
.fg label{display:block;font-size:12px;font-weight:500;color:var(--tx2);margin-bottom:4px;letter-spacing:.03em;}
.fg input,.fg select,.fg textarea{width:100%;padding:9px 11px;border:1px solid var(--bd);border-radius:var(--r);font-size:14px;font-family:var(--sn);background:var(--bg);color:var(--tx);outline:none;transition:border-color .12s;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--gr);}
.fg textarea{resize:vertical;min-height:60px;}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px;}
.err{font-size:12px;color:var(--rd);margin-top:5px;min-height:16px;}
.pw-w{position:relative;display:flex;}
.pw-w input{flex:1;padding-right:38px;}
.pw-eye{position:absolute;right:0;top:0;bottom:0;width:36px;background:none;border:none;cursor:pointer;color:var(--tx3);font-size:15px;display:flex;align-items:center;justify-content:center;}
.pw-eye:hover{color:var(--tx2);}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;border-radius:var(--r);font-family:var(--sn);cursor:pointer;font-size:13px;transition:opacity .12s,background .12s,color .12s,border-color .12s;white-space:nowrap;padding:8px 14px;border:none;}
.btn-dk{background:#1a1a18;color:#fff;}
.btn-dk:hover{opacity:.82;}
.btn-dk.full{width:100%;padding:11px;font-size:14px;}
.btn-gh{background:transparent;color:var(--tx);border:1px solid var(--bd);}
.btn-gh:hover{border-color:var(--tx);}
.btn-gn{background:var(--gr-l);color:var(--gr);border:1px solid var(--gr-b);}
.btn-gn:hover{background:var(--gr);color:#fff;}
.btn-rd{background:var(--rd-l);color:var(--rd);border:1px solid var(--rd-b);}
.btn-rd:hover{background:var(--rd);color:#fff;}
.btn-bl{background:var(--bl-l);color:var(--bl);border:1px solid var(--bl-b);}
.btn-bl:hover{background:var(--bl);color:#fff;}
.btn-sm{padding:5px 10px;font-size:12px;}
.btn-xs{padding:3px 8px;font-size:11px;}

/* BADGES */
.bx{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap;}
.bx-gn{background:var(--gr-l);color:var(--gr);}
.bx-rd{background:var(--rd-l);color:var(--rd);}
.bx-am{background:var(--am-l);color:var(--am);}
.bx-gy{background:var(--sf2);color:var(--tx2);}
.bx-bl{background:var(--bl-l);color:var(--bl);}
.bx-pu{background:var(--pu-l);color:var(--pu);}

/* CARDS */
.card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);overflow:hidden;margin-bottom:16px;}
.ch{padding:13px 18px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.ch h3{font-size:14px;font-weight:700;}
.cb{padding:18px;}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-bottom:16px;}
.st{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);padding:13px 16px;}
.st .lb{font-size:11px;color:var(--tx2);font-weight:500;letter-spacing:.04em;margin-bottom:3px;}
.st .vl{font-size:24px;font-weight:700;font-family:var(--mn);}

/* INFO ROW */
.ir{display:flex;gap:10px;padding:7px 0;border-bottom:1px solid var(--bd);}
.ir:last-child{border-bottom:none;}
.ir-l{font-size:11px;color:var(--tx3);min-width:90px;padding-top:1px;font-weight:500;flex-shrink:0;}
.ir-v{font-size:13px;flex:1;min-width:0;}

/* MODAL */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal{background:var(--sf);border-radius:var(--rl);width:100%;max-width:520px;max-height:92vh;overflow-y:auto;padding:24px;position:relative;}
.modal h3{font-size:16px;font-weight:700;margin-bottom:3px;padding-right:26px;}
.modal .ms{font-size:12px;color:var(--tx2);margin-bottom:14px;}
.mc{position:absolute;top:12px;right:14px;background:none;border:none;font-size:18px;cursor:pointer;color:var(--tx2);padding:4px;}
.mc:hover{color:var(--tx);}
.ma{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;flex-wrap:wrap;}
.div{border:none;border-top:1px solid var(--bd);margin:13px 0;}

/* CALENDAR */
.cal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px;}
.cnav{display:flex;gap:6px;align-items:center;}
.cnav button{background:var(--sf);border:1px solid var(--bd);width:29px;height:29px;border-radius:var(--r);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}
.cnav button:hover{background:var(--sf2);}
.cnav span{font-size:14px;font-weight:700;min-width:130px;text-align:center;}
.ttabs{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px;align-items:center;}
.ttab{padding:6px 13px;border-radius:20px;border:1px solid var(--bd);background:var(--sf);font-size:13px;cursor:pointer;transition:all .12s;color:var(--tx2);}
.ttab:hover{border-color:var(--gr);color:var(--gr);}
.ttab.on{background:var(--gr);color:#fff;border-color:var(--gr);}
.ti-btn{padding:4px 9px;font-size:11px;background:var(--bl-l);color:var(--bl);border:1px solid var(--bl-b);border-radius:20px;cursor:pointer;}
.ti-btn:hover{background:var(--bl);color:#fff;}
.cgrid{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);overflow:hidden;}
.cgh{display:grid;grid-template-columns:74px repeat(7,minmax(0,1fr));background:var(--sf2);border-bottom:1px solid var(--bd);}
.cgh>div{padding:8px 4px;text-align:center;font-size:11px;font-weight:500;color:var(--tx2);}
.cgh>div.tod{color:var(--gr);font-weight:700;}
.cgr{display:grid;grid-template-columns:74px repeat(7,minmax(0,1fr));border-bottom:1px solid var(--bd);}
.cgr:last-child{border-bottom:none;}
.cgt{padding:5px 3px;font-size:10px;color:var(--tx3);font-family:var(--mn);display:flex;align-items:center;justify-content:center;border-right:1px solid var(--bd);background:var(--sf2);text-align:center;line-height:1.3;}
.cgc{padding:4px;display:flex;align-items:center;justify-content:center;border-right:1px solid var(--bd);min-height:64px;}
.cgc:last-child{border-right:none;}
.sb{width:100%;padding:5px 3px;border-radius:6px;text-align:center;font-size:10px;font-weight:500;line-height:1.35;border:1px solid transparent;}
.sb-e{background:var(--gr-l);color:var(--gr);border-color:var(--gr-b);cursor:pointer;}
.sb-e:hover{background:var(--gr);color:#fff;}
.sb-f{background:var(--rd-l);color:var(--rd);border-color:var(--rd-b);}
.sb-m{background:var(--am-l);color:var(--am);border-color:var(--am-b);cursor:pointer;}
.sb-m:hover{background:#f0e088;}
.sb-p{background:var(--sf2);color:var(--tx3);border-color:var(--bd);}
.sb-o{background:var(--bg);color:var(--tx3);border:1px dashed var(--bd);font-size:9px;}
.legend{display:flex;gap:11px;flex-wrap:wrap;font-size:12px;color:var(--tx2);margin-top:9px;align-items:center;}

/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:13px;}
.tbl th{text-align:left;padding:9px 12px;font-size:11px;font-weight:500;color:var(--tx2);letter-spacing:.04em;border-bottom:1px solid var(--bd);background:var(--sf2);white-space:nowrap;}
.tbl td{padding:10px 12px;border-bottom:1px solid var(--bd);vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:var(--sf2);}
.tbl th[onclick]{cursor:pointer;}
.tbl th[onclick]:hover{background:var(--sf2);}

/* CHIPS */
.chips{display:flex;flex-wrap:wrap;gap:5px;padding:8px;border:1px solid var(--bd);border-radius:var(--r);background:var(--bg);}
.chip{padding:3px 9px;border-radius:20px;font-size:12px;border:1px solid var(--bd);cursor:pointer;background:var(--sf);}
.chip.on{background:var(--gr);color:#fff;border-color:var(--gr);}

/* SEARCH */
.sbar{display:flex;gap:10px;flex-wrap:wrap;background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);padding:14px;margin-bottom:14px;align-items:flex-end;}
.sbar .fg{margin-bottom:0;flex:1;min-width:130px;}
.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;}
.tc{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);padding:15px;}
.tc h4{font-size:14px;font-weight:700;margin-bottom:6px;}
.stags{display:flex;flex-wrap:wrap;gap:4px;margin:6px 0;}
.stag{padding:2px 7px;background:var(--gr-l);color:var(--gr);border-radius:12px;font-size:11px;font-weight:500;}
.stag.hl{background:var(--gr);color:#fff;}

/* STUDENT DB */
.grade-tree{display:flex;flex-direction:column;gap:10px;}
.grade-block{border:1px solid var(--bd);border-radius:var(--rl);overflow:hidden;}
.grade-head{padding:11px 16px;background:var(--sf2);display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;}
.grade-head h4{font-size:14px;font-weight:700;}
.grade-body{padding:14px 16px;display:none;}
.grade-body.open{display:block;}
.class-block{margin-bottom:12px;}
.class-head{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;background:var(--bl-l);border-radius:var(--r);margin-bottom:6px;}
.class-head span{font-size:13px;font-weight:500;color:var(--bl);}
.student-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:5px;}
.stu-item{display:flex;align-items:center;gap:8px;padding:5px 9px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);font-size:12px;}
.stu-id{font-family:var(--mn);font-size:11px;color:var(--tx3);}

/* TUTOR SCHEDULE EDITOR */
.sch-week{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:12px;}
.sch-day{border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;}
.sch-day-head{padding:6px 8px;text-align:center;font-size:12px;font-weight:500;background:var(--sf2);border-bottom:1px solid var(--bd);}
.sch-day-head.work{background:var(--gr-l);color:var(--gr);}
.sch-day-head.off{background:var(--sf2);color:var(--tx3);}
.sch-day-body{padding:7px;}
.sch-slot{background:var(--gr-l);border:1px solid var(--gr-b);border-radius:5px;padding:4px 6px;margin-bottom:4px;font-size:11px;color:var(--gr);display:flex;align-items:center;justify-content:space-between;}
.sch-slot button{background:none;border:none;cursor:pointer;color:var(--rd);font-size:13px;padding:0 2px;line-height:1;}
.add-slot-btn{width:100%;padding:4px;font-size:11px;background:transparent;border:1px dashed var(--bd);border-radius:5px;cursor:pointer;color:var(--tx3);}
.add-slot-btn:hover{border-color:var(--gr);color:var(--gr);}

/* OVERRIDE PANEL */
.override-list{display:flex;flex-direction:column;gap:6px;}
.ov-item{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--am-l);border:1px solid var(--am-b);border-radius:var(--r);font-size:12px;}
.ov-item .ov-date{font-family:var(--mn);font-size:11px;color:var(--am);min-width:80px;}
.ov-item .ov-slots{flex:1;display:flex;flex-wrap:wrap;gap:4px;}
.ov-item button{background:none;border:none;cursor:pointer;color:var(--rd);font-size:14px;}

/* ── TABLET (≤900px) ── */
@media(max-width:900px){
  #sb{width:180px;min-width:180px;}
  .stats{grid-template-columns:1fr 1fr;}
  .fr3{grid-template-columns:1fr 1fr;}
}

/* ── MOBILE (≤640px) ── */
@media(max-width:640px){
  /* Sidebar becomes a slide-over overlay */
  #sb{
    position:fixed;top:0;left:0;bottom:0;
    width:240px;min-width:240px;
    transform:translateX(-100%);
    transition:transform .22s ease;
    z-index:300;
    height:100vh;
  }
  #sb.sb-open{transform:translateX(0);}
  #sb-overlay{
    display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:299;
  }
  #sb-overlay.sb-open{display:block;}
  /* Restore full sidebar labels on mobile overlay */
  #sb .logo p,#sb nav button span,#sb .su .sn,#sb .su p,#sb .sl{display:block!important;}
  #sb .logo h1{font-size:13px!important;}
  #sb nav button{justify-content:flex-start!important;padding:8px 12px!important;}

  /* Hamburger button - shown only on mobile */
  #hamburger{display:flex!important;}

  /* Top bar */
  #topbar{padding:8px 14px;gap:8px;}
  #topbar h2{font-size:15px;}

  /* Main content */
  #main{width:100%;}
  #ct{padding:10px 10px;overflow-x:hidden;}

  /* Cards */
  .card{margin-bottom:10px;}
  .ch{padding:10px 12px;}
  .cb{padding:12px;}

  /* Stats: 2 columns */
  .stats{grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
  .st{padding:10px 12px;}
  .st .vl{font-size:20px;}

  /* Forms: single column */
  .fr{grid-template-columns:1fr!important;}
  .fr3{grid-template-columns:1fr!important;}

  /* Buttons: bigger tap targets */
  .btn{padding:10px 14px;font-size:13px;}
  .btn-sm{padding:7px 11px;font-size:12px;}
  .btn-xs{padding:5px 9px;font-size:11px;}
  .btn-dk.full{padding:13px;}

  /* Calendar grid: horizontal scroll */
  .cgrid{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .cgh{grid-template-columns:60px repeat(6,minmax(70px,1fr));min-width:480px;}
  .cgr{grid-template-columns:60px repeat(6,minmax(70px,1fr));min-width:480px;}
  .cgt{font-size:9px;padding:4px 2px;}
  .cgc{min-height:52px;padding:3px;}
  .sb{font-size:9px;padding:4px 2px;}

  /* Schedule week editor: scroll on mobile */
  .sch-week{grid-template-columns:repeat(4,1fr);}

  /* Modal: slide up from bottom */
  .ov{padding:0;align-items:flex-end;}
  .modal{
    border-radius:16px 16px 0 0;
    max-width:100%;
    width:100%;
    max-height:88vh;
    padding:18px 16px;
  }

  /* Table wrapper: horizontal scroll */
  .tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .tbl{font-size:12px;}
  .tbl th,.tbl td{padding:8px 8px;white-space:nowrap;}

  /* Tutor tabs: horizontal scroll */
  .ttabs-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px;}

  /* Login card */
  .lc{padding:24px 18px;}
  .lc h1{font-size:18px;}

  /* Chip selector: tighter */
  .chip{padding:4px 10px;font-size:12px;}

  /* Hide non-essential topbar items on small screens */
  #topbar .tm{display:none;}
}

/* ── VERY SMALL (≤390px) ── */
@media(max-width:390px){
  #ct{padding:8px 8px;}
  .stats{grid-template-columns:1fr 1fr;gap:6px;}
  .cgh{grid-template-columns:52px repeat(6,minmax(62px,1fr));min-width:420px;}
  .cgr{grid-template-columns:52px repeat(6,minmax(62px,1fr));min-width:420px;}
}

/* PRINT */
@media print{
  body>*:not(#print-area){display:none!important;}
  #print-area{display:block!important;font-family:'Noto Sans JP',sans-serif;}
  .no-print{display:none!important;}
}
#print-area{display:none;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="ls">
  <div class="lc">
    <h1>📚 指導予約システム 📚</h1>
    <p class="lc-sub">選択してログインしてください</p>
    <div class="rtabs" id="rtabs">
      <button class="on" onclick="setRole('student')">生徒</button>
      <button onclick="setRole('tutor')">チューター</button>
      <button onclick="setRole('admin')">管理者</button>
    </div>
    <div class="fg"><label>ユーザーID</label><input type="text" id="l-id" placeholder="ユーザーIDを入力" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    <div class="fg" id="l-pw-g">
      <label>パスワード</label>
      <div class="pw-w"><input type="password" id="l-pw" placeholder="パスワードを入力" onkeydown="if(event.key==='Enter')doLogin()"/><button class="pw-eye" type="button" onclick="eyeToggle('l-pw',this)">👁</button></div>
    </div>
    <div class="err" id="l-err"></div>
    <button class="btn btn-dk full" style="margin-top:6px" onclick="doLogin()">ログイン</button>
    <p style="font-size:11px;color:var(--tx3);margin-top:10px;text-align:center">全ロールでID・パスワード必須 ／ 初期パスワードは生徒番号と同じ</p>
  </div>
</div>

<!-- APP -->
<div id="sb-overlay" onclick="closeSB()"></div>
<div id="app" style="display:none">
  <div id="sb">
    <div class="logo"><h1>📚 SSC 予約システム 📚</h1><p>Tutoring Scheduler</p></div>
    <nav id="snav"></nav>
    <div class="su">
      <p>ログイン中</p>
      <span class="sn" id="s-un"></span>
      <button class="sl" onclick="doLogout()">ログアウト</button>
      <button id="btn-save-html" class="btn btn-gn" style="display:none;margin:6px 8px 0;width:calc(100% - 16px);font-size:12px" onclick="saveHtml()">💾 HTMLデータ保存</button>
    </div>
  </div>
  <div id="main">
    <div id="topbar">

function ldate(d){return `${d.getFullYear()}-${z(d.getMonth()+1)}-${z(d.getDate())}`;}
function dstr(n){const d=new Date();d.setDate(d.getDate()+n);return ldate(d);}
function pd(s){return new Date(s+'T00:00:00');}
function fd(s){const d=pd(s);return `${d.getMonth()+1}/${d.getDate()}`;}
function fdt(iso){const d=new Date(iso);return `${d.getFullYear()}/${z(d.getMonth()+1)}/${z(d.getDate())} ${z(d.getHours())}:${z(d.getMinutes())}`;}
function z(n){return String(n).padStart(2,'0');}
function today(){return ldate(new Date());}
function wkd(off){
  const t=new Date();t.setHours(0,0,0,0);
  const m=new Date(t);m.setDate(t.getDate()-(t.getDay()+6)%7+off*7); // correct Mon-start (works for Sunday too)
  return Array.from({length:6},(_,i)=>{const d=new Date(m);d.setDate(m.getDate()+i);return d;}); // Mon-Sat
}
function wkd7(off){
  const t=new Date();t.setHours(0,0,0,0);
  const m=new Date(t);m.setDate(t.getDate()-(t.getDay()+6)%7+off*7); // Mon start
  return Array.from({length:7},(_,i)=>{const d=new Date(m);d.setDate(m.getDate()+i);return d;}); // Mon-Sun
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ─── QUOTA: 28コマ持ち分 ───
// 消費済みコマ = 未来日の予約数のみ（過去日は自動回収）
const QUOTA_MAX=28;
function studentUsedSlots(sid){
  const ts=today();
  return reservations.filter(r=>r.studentId===sid && r.date>=ts).length;
}
function studentQuotaLeft(sid){ return QUOTA_MAX - studentUsedSlots(sid); }

// Flat lookup
function flatStudents(){
  const m={};
  Object.values(studentDB).forEach(cls=>Object.values(cls).forEach(arr=>arr.forEach(s=>m[s.id]=s)));
  return m;
}

// ─── 重複チェック: 同日同コマ時間帯に別の指導者を既に予約していないか ───
function hasTimeConflict(sid, date, tutorId, slotIdx){
  // Get time range of the slot being booked
  const newSlots=getTutorSlots(tutorId,date);
  const newSlot=newSlots[slotIdx];
  if(!newSlot)return false;
  // Check all other reservations for same student on same date with different tutors
  const sameDay=reservations.filter(r=>r.studentId===sid && r.date===date && r.tutorId!==tutorId);
  for(const r of sameDay){
    const rSlots=getTutorSlots(r.tutorId,date);
    const rSlot=rSlots[r.slotIdx];
    if(!rSlot)continue;
    // overlap check
    if(newSlot.start < rSlot.end && newSlot.end > rSlot.start) return true;
  }
  return false;
}

// ─── 同一指導者同日2コマ上限チェック ───
function sameTutorDayCount(sid, date, tutorId){
  return reservations.filter(r=>r.studentId===sid && r.date===date && r.tutorId===tutorId).length;
}

// ─── 予約バリデーション ─── returns null if OK, string if error
function validateBooking(sid, date, slotIdx, tutorId){
  // 0) 欠勤チェック
  if(isTutorAbsent(tutorId,date)){
    const t=tutors[tutorId];const d=pd(date);
    return `${t?t.name:'この指導者'}は${d.getMonth()+1}/${d.getDate()}は欠勤のため予約できません。`;
  }
  // 0b) 管理者予約チェック
  if(adminReservations.find(r=>r.date===date&&r.slotIdx===slotIdx&&r.tutorId===tutorId)){
    return 'このコマは管理者によって予約済みです（面談・業務等）。';
  }
  // 1) quota
  if(studentQuotaLeft(sid)<=0) return `予約可能なコマ数（${QUOTA_MAX}コマ）の上限に達しています。過去のコマが終了すると自動的に回復します。`;
  // 2) 同日同時間帯重複
  if(hasTimeConflict(sid,date,tutorId,slotIdx)){
    const slots=getTutorSlots(tutorId,date);const sl=slots[slotIdx];
    return `この時間帯（${sl?sl.start+'〜'+sl.end:''}）はすでに別の指導者を予約しています。`;
  }
  // 3) 同一指導者 1日2コマ上限
  if(sameTutorDayCount(sid,date,tutorId)>=2){
    const t=tutors[tutorId];
    return `${t?t.name:'この指導者'}への${date.slice(5).replace('-','/')}の予約は上限（2コマ）に達しています。`;
  }
  return null;
}

// ─── 欠勤処理：その日の予約生徒に通知 + overrideに'absence'をセット ───
function processTutorAbsence(tid, date, reason){
  const t=tutors[tid];if(!t)return;
  tutorAbsences.push({tutorId:tid,date,reason,createdAt:new Date().toISOString()});
  if(schedules[tid])schedules[tid].overrides[date]='absence';
  const affected=reservations.filter(r=>r.tutorId===tid&&r.date===date);
  const d=pd(date);
  const dateStr=`${d.getMonth()+1}月${d.getDate()}日`;
  affected.forEach(r=>{
    notifications.push({
      studentId:r.studentId,
      message:`${t.name}は${reason}のため${dateStr}の出勤がなくなりました。他の指導者を予約するか、管理教員に問い合わせてください。`,
      readAt:null,
      createdAt:new Date().toISOString(),
    });
  });
}

// Get slots for tutor on a date ('absence' and 'off' both return [])
function getTutorSlots(tid,dateS){
  const sc=schedules[tid];if(!sc)return[];
  const d=pd(dateS);const dow=d.getDay();
  if(sc.overrides&&sc.overrides[dateS]!==undefined){
    const ov=sc.overrides[dateS];
    return(ov==='off'||ov==='absence')?[]:ov;
  }
  const wt=sc.weeklyTemplate[dow];
  return wt||[];
}

function isTutorAbsent(tid,dateS){return schedules[tid]?.overrides[dateS]==='absence';}

// getRes checks both student reservations and admin reservations
function getRes(date,slotIdx,tid){
  return reservations.find(r=>r.date===date&&r.slotIdx===slotIdx&&r.tutorId===tid)
    ||adminReservations.find(r=>r.date===date&&r.slotIdx===slotIdx&&r.tutorId===tid)
    ||null;
}

// ═══════════════════════════ LOGIN ═══════════════════════════
let LR='student';
function setRole(r){
  LR=r;
  document.querySelectorAll('#rtabs button').forEach((b,i)=>b.classList.toggle('on',['student','tutor','admin'][i]===r));
  document.getElementById('l-pw-g').style.display='block'; // all roles need password
  document.getElementById('l-err').textContent='';
}
function doLogin(){
  const id=document.getElementById('l-id').value.trim();
  const pw=document.getElementById('l-pw').value;
  let user=null;
  if(LR==='admin'){
    if(id===ADMIN.id&&pw===ADMIN.pw)user={...ADMIN};
    else{document.getElementById('l-err').textContent='IDまたはパスワードが違います';return;}
  }else if(LR==='tutor'){
    const t=tutors[id];
    if(!t){document.getElementById('l-err').textContent='指導者IDが見つかりません';return;}
    if(t.pw!==pw){document.getElementById('l-err').textContent='パスワードが違います';return;}
    user={...t,role:'tutor'};
  }else{
    const fs=flatStudents();
    if(!fs[id]){document.getElementById('l-err').textContent='生徒IDが見つかりません';return;}
    const stuObj=fs[id];
    const stuPw=stuObj.pw||stuObj.id; // default pw = ID if not set
    if(pw!==stuPw){document.getElementById('l-err').textContent='パスワードが違います';return;}
    user={...stuObj,role:'student'};
  }
  CU=user;
  // Build log entry with grade/klass for filtering
  let _logGrade='',_logKlass='';
  if(user.role==='student'){
    Object.entries(studentDB).forEach(([g,classes])=>{
      Object.entries(classes).forEach(([kl,arr])=>{
        if(arr.some(s=>s.id===id)){_logGrade=g;_logKlass=kl;}
      });
    });
  } else if(user.role==='tutor'){
    _logGrade=user.grade||'';
  }
  loginLogs.unshift({userId:id,name:user.name,role:{student:'生徒',tutor:'指導者',admin:'管理者'}[user.role],grade:_logGrade,klass:_logKlass,loginAt:new Date().toISOString()});
  saveToStorage();
  document.getElementById('ls').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('s-un').textContent=user.name;
  buildSB();
  calTid=user.role==='tutor'?user.id:(Object.keys(tutors)[0]||null);
  showPg(user.role==='admin'?'all-res':user.role==='tutor'?'t-cal':'cal');
  startAutoLogout();
  document.getElementById('btn-save-html').style.display=user.role==='admin'?'block':'none';
}
function doLogout(){
  stopAutoLogout();
  CU=null;WO=0;
  document.getElementById('app').style.display='none';
  document.getElementById('ls').style.display='flex';
  document.getElementById('l-id').value='';
  document.getElementById('l-pw').value='';
  document.getElementById('l-err').textContent='';
  document.getElementById('btn-save-html').style.display='none';
  setRole('student');
}

// ═══════════════════════════ STUDENT CALENDAR ═══════════════════════════
function pgCal(C){
  const dates=wkd(WO);const ts=today();
  const tList=Object.values(tutors);
  if(!tList.length){C.innerHTML='<p style="color:var(--tx2);padding:20px">指導者が登録されていません</p>';return;}
  if(!calTid||!tutors[calTid])calTid=tList[0].id;
  const wl=`${dates[0].getMonth()+1}/${dates[0].getDate()} 〜 ${dates[5].getMonth()+1}/${dates[5].getDate()}`;
  const maxSlots=Math.max(...dates.map(d=>getTutorSlots(calTid,ldate(d)).length),1);

  // Notifications for this student
  const myNotifs=notifications.filter(n=>n.studentId===CU.id&&!n.readAt);
  const notifHtml=myNotifs.length?`<div style="background:var(--am-l);border:1px solid var(--am-b);border-radius:var(--r);padding:12px 14px;margin-bottom:14px">
    <div style="font-size:13px;font-weight:500;color:var(--am);margin-bottom:6px">📢 お知らせ（${myNotifs.length}件）</div>
    ${myNotifs.map((n,i)=>`<div style="font-size:13px;color:var(--tx);padding:6px 0;border-bottom:1px solid var(--am-b);display:flex;justify-content:space-between;gap:10px">
      <span>${esc(n.message)}</span>
      <button class="btn btn-sm" style="background:transparent;border:1px solid var(--am-b);color:var(--am);white-space:nowrap" onclick="readNotif(${notifications.indexOf(n)})">既読</button>
    </div>`).join('')}
  </div>`:'';

  const left=studentQuotaLeft(CU.id);
  const usedPct=Math.round((QUOTA_MAX-left)/QUOTA_MAX*100);
  const quotaBar=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;padding:10px 14px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r)">
    <span style="font-size:12px;color:var(--tx2);white-space:nowrap">予約残コマ数</span>
    <div style="flex:1;height:8px;background:var(--sf2);border-radius:4px;overflow:hidden">
      <div style="height:100%;width:${usedPct}%;background:${left<=5?'var(--rd)':left<=14?'var(--am)':'var(--gr)'};border-radius:4px"></div>
    </div>
    <span style="font-size:13px;font-weight:700;color:${left<=5?'var(--rd)':left<=14?'var(--am)':'var(--gr)'};white-space:nowrap">${left} / ${QUOTA_MAX}</span>
  </div>`;

  // 予約の傾向
  const myRes=reservations.filter(r=>r.studentId===CU.id);
  let trendHtml='';
  if(myRes.length>0){
    const tutorCnt={};myRes.forEach(r=>{tutorCnt[r.tutorId]=(tutorCnt[r.tutorId]||0)+1;});
    const tutorSorted=Object.entries(tutorCnt).sort((a,b)=>b[1]-a[1]);
    const subCnt={};myRes.forEach(r=>{if(r.subject)subCnt[r.subject]=(subCnt[r.subject]||0)+1;});
    const subSorted=Object.entries(subCnt).sort((a,b)=>b[1]-a[1]);
    const total=myRes.length;
    trendHtml=`<div style="background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:14px 16px;margin-bottom:14px">
      <div style="font-size:13px;font-weight:700;margin-bottom:12px">📊 予約の傾向</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
        <div>
          <div style="font-size:11px;font-weight:600;color:var(--tx2);margin-bottom:8px;letter-spacing:.04em">よく利用する指導者</div>
          ${tutorSorted.map(([tid,cnt])=>{const t2=tutors[tid];const pct=Math.round(cnt/total*100);return`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
            <span style="font-size:12px;min-width:70px;white-space:nowrap">${esc(t2?t2.name:tid)}</span>
            <div style="flex:1;height:6px;background:var(--sf2);border-radius:3px;overflow:hidden"><div style="height:100%;width:${pct}%;background:var(--gr);border-radius:3px"></div></div>
            <span style="font-size:11px;color:var(--tx2);font-family:var(--mn);min-width:30px;text-align:right">${cnt}回</span>
          </div>`;}).join('')}
        </div>
        <div>
          <div style="font-size:11px;font-weight:600;color:var(--tx2);margin-bottom:8px;letter-spacing:.04em">科目別指導回数</div>
          ${subSorted.map(([sub,cnt])=>{const pct=Math.round(cnt/total*100);return`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
            <span style="font-size:12px;min-width:60px;white-space:nowrap">${esc(sub)}</span>
            <div style="flex:1;height:6px;background:var(--sf2);border-radius:3px;overflow:hidden"><div style="height:100%;width:${pct}%;background:var(--bl);border-radius:3px"></div></div>
            <span style="font-size:11px;color:var(--tx2);font-family:var(--mn);min-width:30px;text-align:right">${cnt}回</span>
          </div>`;}).join('')}
        </div>
      </div>
      <div style="font-size:11px;color:var(--tx3);margin-top:10px;text-align:right">累計 ${total} コマ（全期間）</div>
    </div>`;
  }

  let h=`${notifHtml}${quotaBar}${trendHtml}
  <div class="cal-hd">
    <div class="cnav">
      <button onclick="wkn(-1)">&#8249;</button><span>${wl}</span><button onclick="wkn(1)">&#8250;</button>
    </div>
    <button class="btn btn-gh btn-sm" onclick="wkn(0,1)">今週</button>
  </div>
  <div style="overflow-x:auto;margin-bottom:10px">
    <div style="display:flex;flex-wrap:wrap;gap:6px;min-width:0;padding:2px">
      ${tList.map(t=>`<button onclick="swTid('${t.id}')" style="display:flex;flex-direction:column;align-items:flex-start;padding:8px 12px;border:2px solid ${t.id===calTid?'var(--gr)':'var(--bd)'};border-radius:var(--r);background:${t.id===calTid?'var(--gr-l)':'var(--bg)'};cursor:pointer;min-width:110px;max-width:160px;transition:border-color .15s" onmouseenter="this.style.borderColor='var(--gr)'" onmouseleave="this.style.borderColor='${t.id===calTid?'var(--gr)':'var(--bd)'}'" >
        <span style="font-size:13px;font-weight:${t.id===calTid?'700':'500'};color:${t.id===calTid?'var(--gr)':'var(--tx)'};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px">${esc(t.name)}</span>
        <span style="font-size:10px;color:var(--tx2);margin-top:3px;white-space:normal;line-height:1.4">${t.subjects.slice(0,3).map(s=>esc(s)).join(' · ')}${t.subjects.length>3?' +'+( t.subjects.length-3):''}</span>
      </button>`).join('')}
    </div>
  </div>
  <div class="cgrid">
    <div class="cgh">
      <div>コマ</div>
      ${dates.map(d=>{
        const ds=ldate(d);const it=ds===ts;
        const slots=getTutorSlots(calTid,ds);
        const absent=isTutorAbsent(calTid,ds);
        const wkInfo=slots.length?`<span style="font-size:9px;color:var(--gr)">${slots.length}コマ</span>`:
          absent?`<span style="font-size:9px;color:var(--rd);font-weight:600">欠勤</span>`:
          `<span style="font-size:9px;color:var(--tx3)">休み</span>`;
        return `<div class="${it?'tod':''}"><div>${WD[d.getDay()]}</div><div style="font-size:16px;font-weight:700">${d.getDate()}</div>${wkInfo}</div>`;
      }).join('')}
    </div>
    ${Array.from({length:maxSlots},(_,si)=>`
    <div class="cgr">
      <div class="cgt">コマ${si+1}</div>
      ${dates.map(d=>{
        const ds=ldate(d);
        const absent=isTutorAbsent(calTid,ds);
        if(absent)return`<div class="cgc"><div class="sb sb-f" style="background:var(--rd-l);color:var(--rd);border-color:var(--rd-b);font-size:9px">欠勤</div></div>`;
        const slots=getTutorSlots(calTid,ds);
        const slot=slots[si];
        if(!slot)return`<div class="cgc"><div class="sb sb-o">—</div></div>`;
        const past=d<new Date(new Date().setHours(0,0,0,0));
        const res=getRes(ds,si,calTid);
        let b='';
        if(past){
          b=res?`<div class="sb sb-p">済<br>${esc(res.isAdmin?'別業務':res.subject)}</div>`:`<div class="sb sb-p">終了</div>`;
        }else if(res&&res.isAdmin){
          b=`<div class="sb sb-f" style="background:var(--bl-l);color:var(--bl);border-color:var(--bl-b);font-size:11px;line-height:1.4">別業務<br><span style="font-size:9px">予約不可</span></div>`;
        }else if(res&&res.studentId===CU.id){
          b=`<div class="sb sb-m" onclick="modalMySlot(${res.id})">予約済<br>${esc(res.subject)}</div>`;
        }else{
          const myConflict=reservations.find(function(r){
            if(r.studentId!==CU.id||r.date!==ds||r.tutorId===calTid)return false;
            var oslots=getTutorSlots(r.tutorId,ds);
            var osl=oslots[r.slotIdx];
            return osl&&osl.start===slot.start;
          });
          if(myConflict){
            b=`<div class="sb" style="background:var(--pu-l);color:var(--pu);border:1px solid var(--pu-b);font-size:9px;line-height:1.5;text-align:center;border-radius:var(--r);padding:5px 2px">他の先生<br>予約中</div>`;
          }else if(!res){
            b=`<div class="sb sb-e" onclick="modalBook('${ds}',${si},'${calTid}')">空<br><span style="font-size:9px">${slot.start}〜</span></div>`;
          }else{
            b=`<div class="sb sb-f">満</div>`;
          }
        }
        return `<div class="cgc">${b}</div>`;
      }).join('')}
    </div>`).join('')}
  </div>
  <div class="legend">
    <span><span class="bx bx-gn">空</span> 予約可</span>
    <span><span class="bx bx-rd">満</span> 予約済/欠勤</span>
    <span><span class="bx bx-am">予約済</span> 自分</span>
    <span><span class="bx bx-pu">他の先生</span> 同コマ他指導者予約中</span>
    <span><span class="bx bx-bl">別業務</span> 指導者別業務中</span>
    <span><span class="bx bx-gy">終了</span> 過去</span>
  </div>`;
  C.innerHTML=h;
}
function wkn(d,r){if(r)WO=0;else WO+=d;showPg(CU.role==='student'?'cal':'t-cal');}
function swTid(id){calTid=id;pgCal(document.getElementById('ct'));}
function readNotif(idx){
  if(notifications[idx])notifications[idx].readAt=new Date().toISOString();
  pgCal(document.getElementById('ct'));
}

function tutorIM(tid){
  const t=tutors[tid];if(!t)return;
  showModal(`<button class="mc" onclick="CM()">×</button>
    <h3>${esc(t.name)}</h3><p class="ms">指導者プロフィール</p>
    <div class="ir"><span class="ir-l">指導可能科目</span><span class="ir-v"><div class="stags">${t.subjects.map(s=>`<span class="stag">${esc(s)}</span>`).join('')}</div></span></div>
    <div class="ir"><span class="ir-l">一言</span><span class="ir-v">${esc(t.bio||'—')}</span></div>

}

// ═══════════════════════════ BOOKING ═══════════════════════════
function modalBook(date,si,tid){
  const t=tutors[tid];const d=pd(date);
  const slots=getTutorSlots(tid,date);const slot=slots[si];
  const lbl=`${d.getMonth()+1}/${d.getDate()}（${WD[d.getDay()]}） コマ${si+1} ${slot?slot.start+'〜'+slot.end:''}`;
  // pre-validate
  const vErr=validateBooking(CU.id,date,si,tid);
  if(vErr){showModal(`<button class="mc" onclick="CM()">×</button>
    <h3>予約できません</h3><p class="ms">${lbl}</p>
    <div style="background:var(--rd-l);border:1px solid var(--rd-b);border-radius:var(--r);padding:12px;font-size:13px;color:var(--rd)">${esc(vErr)}</div>
    <div class="ma"><button class="btn btn-dk" onclick="CM()">閉じる</button></div>`);return;}
  // quota & cancel warnings
  const left=studentQuotaLeft(CU.id);
  const cancelCnt=studentCancelCount(CU.id);
  const tutorAbsCnt=tutorAbsenceCount(tid);
  const warns=[];
  if(left<=5) warns.push(`⚠️ 残り予約可能コマ数：<strong>${left}コマ</strong>（上限28コマ）`);
  if(cancelCnt>=3) warns.push(`⚠️ あなたのキャンセル回数は<strong>${cancelCnt}回</strong>です。キャンセルはなるべくお控えください。`);
  if(tutorAbsCnt>=2) warns.push(`⚠️ ${esc(t?t.name:tid)}は過去<strong>${tutorAbsCnt}回</strong>の欠勤があります。`);
  const warnHtml=warns.length?`<div style="background:var(--am-l);border:1px solid var(--am-b);border-radius:var(--r);padding:10px 12px;margin-bottom:12px;font-size:12px;color:var(--am);display:flex;flex-direction:column;gap:4px">${warns.map(w=>`<div>${w}</div>`).join('')}</div>`:'';
  showModal(`<button class="mc" onclick="CM()">×</button>
    <h3>新規予約</h3><p class="ms">${lbl} ／ ${esc(t?t.name:'')}</p>
    ${warnHtml}
    <div style="font-size:12px;color:var(--tx2);margin-bottom:10px">残り予約可能コマ数：<strong style="color:var(--gr)">${left}</strong> / ${QUOTA_MAX}</div>
    <div class="fg"><label>科目</label><select id="bk-s">${(t?t.subjects:ALL_SJ).map(s=>`<option>${esc(s)}</option>`).join('')}</select></div>
    <div class="fg"><label>範囲・単元</label><input type="text" id="bk-r" placeholder="例：二次方程式、3章"/></div>
    <div class="fg"><label>目的</label><select id="bk-p"><option>定期テスト対策</option><option>受験準備</option><option>授業補習</option><option>応用発展</option><option>その他</option></select></div>
    <div class="fg"><label>同時受講者（いなければ「なし」）</label><input type="text" id="bk-c" value="なし"/></div>
    <div class="err" id="bk-e"></div>
    <div class="ma"><button class="btn btn-gh" onclick="CM()">戻る</button><button class="btn btn-dk" onclick="doBook('${date}',${si},'${tid}')">予約確定</button></div>`);
}
function doBook(date,si,tid){
  const range=document.getElementById('bk-r').value.trim();
  if(!range){document.getElementById('bk-e').textContent='範囲・単元を入力してください';return;}
  if(getRes(date,si,tid)){document.getElementById('bk-e').textContent='このコマはすでに予約されています';return;}
  const vErr=validateBooking(CU.id,date,si,tid);
  if(vErr){document.getElementById('bk-e').textContent=vErr;return;}
  reservations.push({id:nid++,date,slotIdx:si,studentId:CU.id,tutorId:tid,
    subject:document.getElementById('bk-s').value,range,
    purpose:document.getElementById('bk-p').value,
    concurrent:document.getElementById('bk-c').value||'なし'});
  saveToStorage();CM();pgCal(document.getElementById('ct'));
}

function modalMySlot(id){
  const res=reservations.find(r=>r.id===id);if(!res)return;
  const d=pd(res.date);
  const slots=getTutorSlots(res.tutorId,res.date);const slot=slots[res.slotIdx];
  const lbl=`${d.getMonth()+1}/${d.getDate()}（${WD[d.getDay()]}） コマ${res.slotIdx+1} ${slot?slot.start+'〜'+slot.end:''}`;
  const t=tutors[res.tutorId];
  showModal(`<button class="mc" onclick="CM()">×</button>
    <h3>予約詳細・修正</h3><p class="ms">${lbl}</p>
    <div class="ir"><span class="ir-l">指導者</span><span class="ir-v">${esc(t?t.name:res.tutorId)}</span></div>
    <hr class="div">
    <div class="fr">
      <div class="fg"><label>科目</label><select id="ed-s">${(t?t.subjects:ALL_SJ).map(s=>`<option ${s===res.subject?'selected':''}>${esc(s)}</option>`).join('')}</select></div>
      <div class="fg"><label>目的</label><select id="ed-p">${['定期テスト対策','受験準備','授業補習','応用発展','その他'].map(p=>`<option ${p===res.purpose?'selected':''}>${p}</option>`).join('')}</select></div>
    </div>
    <div class="fg"><label>範囲・単元</label><input type="text" id="ed-r" value="${esc(res.range)}"/></div>
    <div class="fg"><label>同時受講者</label><input type="text" id="ed-c" value="${esc(res.concurrent)}"/></div>
    <hr class="div">
    <p style="font-size:13px;font-weight:500;color:var(--rd);margin-bottom:7px">キャンセルする場合（理由必須）</p>
    <div class="fg"><textarea id="ed-cr" placeholder="キャンセルの理由を記載してください" rows="2"></textarea></div>
    <div class="err" id="ed-e"></div>
    <div class="ma">
      <button class="btn btn-gh" onclick="CM()">閉じる</button>
      <button class="btn btn-rd" onclick="doCancel(${id})">キャンセル</button>
      <button class="btn btn-dk" onclick="doEdit(${id})">修正保存</button>
    </div>`);
}
function doEdit(id){
  const res=reservations.find(r=>r.id===id);if(!res)return;
  const range=document.getElementById('ed-r').value.trim();
  if(!range){document.getElementById('ed-e').textContent='範囲を入力してください';return;}
  res.subject=document.getElementById('ed-s').value;
  res.purpose=document.getElementById('ed-p').value;
  res.range=range;
  res.concurrent=document.getElementById('ed-c').value||'なし';
  saveToStorage();CM();showPg('my-res');
}
function doCancel(id){
  const reason=document.getElementById('ed-cr').value.trim();
  if(!reason){document.getElementById('ed-e').textContent='キャンセル理由を入力してください';return;}
  const i=reservations.findIndex(r=>r.id===id);
  if(i!==-1){const res=reservations.splice(i,1)[0];cancelled.push({...res,cancelReason:reason,cancelledAt:new Date().toISOString()});}
  saveToStorage();CM();pgCal(document.getElementById('ct'));
}

// ═══════════════════════════ MY RESERVATIONS ═══════════════════════════
let _myResF={tutor:'',subject:'',df:'',dt:''};
function pgMyRes(C){
  const allMine=reservations.filter(r=>r.studentId===CU.id).sort((a,b)=>a.date.localeCompare(b.date)||a.slotIdx-b.slotIdx);
  // Apply filters
  let mine=allMine;
  if(_myResF.tutor){const q=_myResF.tutor.toLowerCase();mine=mine.filter(r=>{const t=tutors[r.tutorId];return t&&t.name.toLowerCase().includes(q);});}
  if(_myResF.subject){mine=mine.filter(r=>r.subject.includes(_myResF.subject));}
  if(_myResF.df){mine=mine.filter(r=>r.date>=_myResF.df);}
  if(_myResF.dt){mine=mine.filter(r=>r.date<=_myResF.dt);}
  const myc=cancelled.filter(r=>r.studentId===CU.id);
  // Subject options
  const subjSet=[...new Set(allMine.map(r=>r.subject))].sort();
  const tutorSet=[...new Set(Object.values(tutors).map(t=>t.name))].sort();
  C.innerHTML=`
  <div class="card" style="margin-bottom:14px">
    <div class="ch"><h3>🔎 絞り込み</h3><span style="font-size:12px;color:var(--tx2)">複数条件は AND で絞り込み</span></div>
    <div class="cb">
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;align-items:end">

// ═══════════════════════════ FIND TUTOR ═══════════════════════════
function pgFind(C){
  C.innerHTML=`
  <div class="sbar">
    <div class="fg"><label>受講したい日</label><input type="date" id="fd-d" min="${today()}"/></div>
    <div class="fg" style="flex:2;min-width:200px"><label>科目（複数可）</label>
      <div class="chips" id="fd-chips">${ALL_SJ.map(s=>`<span class="chip" onclick="this.classList.toggle('on')">${esc(s)}</span>`).join('')}</div>
    </div>
    <button class="btn btn-gn" onclick="doFind()">絞り込み</button>
  </div>
  <div id="fd-r" class="tgrid">${renderTCards(Object.values(tutors),null,[])}</div>`;
}
function doFind(){
  const date=document.getElementById('fd-d').value;
  const subs=[...document.querySelectorAll('#fd-chips .chip.on')].map(c=>c.textContent);
  let list=Object.values(tutors);
  if(date)list=list.filter(t=>getTutorSlots(t.id,date).length>0);
  if(subs.length)list=list.filter(t=>subs.some(s=>t.subjects.includes(s)));
  document.getElementById('fd-r').innerHTML=renderTCards(list,date,subs);
}
function findBySub(sub){
  document.querySelectorAll('#fd-chips .chip').forEach(function(c){c.classList.toggle('on',c.textContent===sub);});
  doFind();
}
function renderTCards(list,date,subs){
  if(!list.length)return'<p style="color:var(--tx2);padding:20px">条件に合う指導者が見つかりませんでした</p>';
  return list.map(t=>{
    const slots=date?getTutorSlots(t.id,date):[];
    const freeSlots=date?slots.filter((_,i)=>!getRes(date,i,t.id)):[];
    const info=date?`<div style="margin-top:8px;font-size:12px;color:var(--tx2)">${fd(date)}：${slots.length?`${slots.length}コマ勤務`:'休み'}</div>
    <div style="margin-top:4px;display:flex;flex-wrap:wrap;gap:4px">${freeSlots.map((sl,i)=>`<span class="bx bx-gn">コマ${slots.indexOf(sl)+1} ${sl.start}〜</span>`).join('')||'<span class="bx bx-gy">空きなし</span>'}</div>`:'';
    return `<div class="tc"><h4>${esc(t.name)}</h4>
      <div class="stags">${t.subjects.map(s=>`<span class="stag ${subs.includes(s)?'hl':''}" style="cursor:pointer" onclick="findBySub('${esc(s)}')" title="${esc(s)}を指導できる先生を表示">${esc(s)}</span>`).join('')}</div>
      <p style="font-size:12px;color:var(--tx2)">${esc(t.bio||'')}</p>${info}
      <div style="margin-top:10px"><button class="btn btn-gn btn-sm" onclick="swTid('${t.id}');showPg('cal')">カレンダーで予約 →</button></div>
    </div>`;
  }).join('');
}

// ═══════════════════════════ TUTOR CALENDAR ═══════════════════════════
function pgTCal(C){
  const ts=today();const tid=CU.id;
  const absCnt=tutorAbsenceCount(tid);
  const absWarn=absCnt>=2?'<div style="background:var(--am-l);border:1px solid var(--am-b);border-radius:var(--r);padding:10px 14px;margin-bottom:14px;font-size:13px;color:var(--am)">⚠️ 欠勤回数：<strong>'+absCnt+'回</strong></div>':'';

  // View selector header
  const viewBar='<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap">'
    +'<div class="rtabs" style="margin-bottom:0">'
    +'<button class="'+(_tCalView==='day'?'on':'')+'" onclick="_tCalView=\'day\';pgTCal(document.getElementById(\'ct\'))">日</button>'
    +'<button class="'+(_tCalView==='week'?'on':'')+'" onclick="_tCalView=\'week\';pgTCal(document.getElementById(\'ct\'))">週</button>'
    +'<button class="'+(_tCalView==='month'?'on':'')+'" onclick="_tCalView=\'month\';pgTCal(document.getElementById(\'ct\'))">月</button>'
    +'</div>'
    +'<button class="btn btn-gh btn-sm" onclick="_tCalView=\'week\';WO=0;_tCalDayOff=0;_tCalMonthOff=0;pgTCal(document.getElementById(\'ct\'))">今日</button>'
    +'</div>';

  let h=absWarn+viewBar;

  if(_tCalView==='day'){
    // ── Day View ──
    const dayD=pd(dstr(_tCalDayOff));
    const ds=ldate(dayD);
    const dow=dayD.getDay();
    const isSun=dow===0;
    const dayLabel=dayD.getFullYear()+'年'+(dayD.getMonth()+1)+'月'+dayD.getDate()+'日（'+WD[dow]+'）';
    h+='<div class="cal-hd"><div class="cnav">'
      +'<button onclick="_tCalDayOff--;pgTCal(document.getElementById(\'ct\'))">&#8249;</button>'
      +'<span>'+dayLabel+'</span>'
      +'<button onclick="_tCalDayOff++;pgTCal(document.getElementById(\'ct\'))">&#8250;</button>'
      +'</div></div>';
    if(isSun){
      h+='<div class="card"><div class="cb" style="text-align:center;padding:30px;color:var(--tx3)">'
        +'<div style="font-size:32px;margin-bottom:8px">🔒</div>'
        +'<div style="font-size:15px;font-weight:700">日曜日は定休日です</div>'
        +'</div></div>';
    } else {
      const slots=getTutorSlots(tid,ds);
      const isAbs=isTutorAbsent(tid,ds);
      h+='<div class="card"><div class="ch"><h3>'+(isAbs?'⚠️ 欠勤日':slots.length+'コマ勤務')+'</h3></div><div class="cb">';
      if(isAbs){
        h+='<div style="color:var(--rd);font-weight:500">この日は欠勤登録されています。</div>';
      } else if(!slots.length){
        h+='<div style="color:var(--tx3)">この日はシフトがありません。</div>';
      } else {
        const pastDay=dayD<new Date(new Date().setHours(0,0,0,0));
        h+='<div style="display:flex;flex-direction:column;gap:8px">';
        slots.forEach(function(sl,i){
          const res=getRes(ds,i,tid);
          let status='';
          if(res&&res.isAdmin) status='<span class="bx" style="background:var(--bl-l);color:var(--bl);border:1px solid var(--bl-b)">'+esc(res.adminType)+'</span>';
          else if(res) status='<span class="bx bx-am">'+esc(res.subject)+' / 生徒:'+esc(res.studentId)+'</span>';
          else if(pastDay) status='<span class="bx bx-gy">終了</span>';
          else status='<span class="bx bx-gn">空き</span>';
          h+='<div style="display:flex;align-items:center;gap:10px;padding:8px;background:var(--sf);border-radius:var(--r)">'
            +'<span style="font-size:13px;font-weight:600;min-width:110px">'+sl.start+'〜'+sl.end+'</span>'
            +'<span style="font-size:12px;color:var(--tx2)">'+sl.label+'</span>'
            +status
            +'</div>';
        });
        h+='</div>';
      }
      h+='</div></div>';
    }
  } else if(_tCalView==='week'){
    // ── Week View (Mon-Sun, 7 days) ──
    const dates=wkd7(WO);
    const wl=(dates[0].getMonth()+1)+'/'+dates[0].getDate()+' 〜 '+(dates[6].getMonth()+1)+'/'+dates[6].getDate();
    const maxSlots=Math.max.apply(null,dates.map(function(d){return getTutorSlots(tid,ldate(d)).length;}).concat([1]));
    h+='<div class="cal-hd"><div class="cnav">'
      +'<button onclick="WO--;pgTCal(document.getElementById(\'ct\'))">&#8249;</button>'
      +'<span>'+wl+'</span>'
      +'<button onclick="WO++;pgTCal(document.getElementById(\'ct\'))">&#8250;</button>'
      +'</div></div>';
    h+='<div class="cgrid"><div class="cgh"><div>コマ</div>';
    dates.forEach(function(d){
      const ds=ldate(d);const it=ds===ts;const isSun=d.getDay()===0;
      const slots=isSun?[]:getTutorSlots(tid,ds);
      h+='<div class="'+(it?'tod':'')+(isSun?' sun-col':'')+'" style="'+(isSun?'background:var(--sf2);':'')+'" title="'+(isSun?'定休日':'')+'">'
        +'<div style="'+(isSun?'color:var(--tx3);':'')+'">'+WD[d.getDay()]+'</div>'
        +'<div style="font-size:16px;font-weight:700;color:'+(isSun?'var(--tx3)':'inherit')+'">'+d.getDate()+'</div>'
        +'<div style="font-size:9px;color:'+(isSun?'var(--tx3)':slots.length?'var(--gr)':'var(--tx3)')+'">'+( isSun?'定休':slots.length?slots.length+'コマ':'休み')+'</div>'
        +'</div>';
    });
    h+='</div>';
    for(var si=0;si<maxSlots;si++){
      h+='<div class="cgr"><div class="cgt">コマ'+(si+1)+'</div>';
      (function(slotIdx){
        dates.forEach(function(d){
          const ds=ldate(d);const isSun=d.getDay()===0;
          if(isSun){h+='<div class="cgc" style="background:var(--sf2)"><div class="sb sb-o" style="color:var(--tx3)">定休</div></div>';return;}
          const slots=getTutorSlots(tid,ds);const slot=slots[slotIdx];
          if(!slot){h+='<div class="cgc"><div class="sb sb-o">—</div></div>';return;}
          const past=d<new Date(new Date().setHours(0,0,0,0));
          const res=getRes(ds,slotIdx,tid);
          let b='';
          if(!res){
            b='<div class="sb '+(past?'sb-p':'sb-e')+'" style="'+(past?'':'cursor:default')+'">'
              +'<span style="font-weight:600">'+slot.start+'</span><br>'
              +'<span style="font-size:9px">〜'+slot.end+'</span><br>空き</div>';
          }else if(res.isAdmin){
            b='<div class="sb" style="background:var(--bl-l);color:var(--bl);border:1px solid var(--bl-b);border-radius:var(--r);padding:6px;text-align:center;cursor:default;font-size:11px;line-height:1.4">'
              +'<span style="font-weight:700">'+esc(res.adminType)+'</span><br>'
              +'<span style="font-size:9px">別業務</span></div>';
          }else{
            b='<div class="sb sb-m" onclick="modalTSlot('+res.id+')" style="cursor:pointer">'
              +'<span style="font-weight:600">'+esc(res.subject)+'</span><br>'
              +'<span style="font-size:9px;font-family:var(--mn)">'+esc(res.studentId)+'</span></div>';
          }
          h+='<div class="cgc">'+b+'</div>';
        });
      })(si);
      h+='</div>';
    }
    h+='</div>';
  } else {
    // ── Month View ──
    const now=new Date();
    const yr=now.getFullYear();const mo=now.getMonth()+_tCalMonthOff;
    const baseDate=new Date(yr,mo,1);
    const year=baseDate.getFullYear();const month=baseDate.getMonth();
    const monthLabel=year+'年'+(month+1)+'月';
    const firstDow=(new Date(year,month,1).getDay()+6)%7; // 0=Mon
    const daysInMonth=new Date(year,month+1,0).getDate();
    h+='<div class="cal-hd"><div class="cnav">'
      +'<button onclick="_tCalMonthOff--;pgTCal(document.getElementById(\'ct\'))">&#8249;</button>'
      +'<span>'+monthLabel+'</span>'
      +'<button onclick="_tCalMonthOff++;pgTCal(document.getElementById(\'ct\'))">&#8250;</button>'
      +'</div></div>';
    h+='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;text-align:center;margin-bottom:8px">';
    ['月','火','水','木','金','土','日'].forEach(function(w,i){
      h+='<div style="font-size:11px;font-weight:600;color:'+(i===6?'var(--tx3)':i===5?'var(--bl)':'var(--tx2)')+';padding:4px">'+w+'</div>';
    });
    h+='</div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">';
    for(var bi=0;bi<firstDow;bi++) h+='<div></div>';
    for(var day=1;day<=daysInMonth;day++){
      const d=new Date(year,month,day);
      const ds=ldate(d);
      const dow=d.getDay();const isSun=dow===0;
      const it=ds===ts;
      const slots=isSun?[]:getTutorSlots(tid,ds);
      const isAbs=!isSun&&isTutorAbsent(tid,ds);
      const rCount=slots.length?(reservations.filter(function(r){return r.tutorId===tid&&r.date===ds;}).length+adminReservations.filter(function(r){return r.tutorId===tid&&r.date===ds;}).length):0;
      const bg=isAbs?'var(--rd-l)':isSun?'var(--sf2)':slots.length?'var(--gr-l)':'var(--sf)';
      const tc=isAbs?'var(--rd)':isSun?'var(--tx3)':slots.length?'var(--gr)':'var(--tx3)';
      const dOff=Math.round((d.getTime()-new Date(ts+'T00:00:00').getTime())/86400000);
      h+='<div onclick="_tCalView=\'day\';_tCalDayOff='+dOff+';pgTCal(document.getElementById(\'ct\'))" style="padding:5px 3px;border:1px solid '+(it?'var(--gr)':'var(--bd)')+';border-radius:var(--r);background:'+bg+';cursor:pointer;min-height:48px;font-size:11px">'
        +'<div style="font-weight:'+(it?700:400)+';color:'+(it?'var(--gr)':isSun?'var(--tx3)':'var(--tx)')+'">'+day+'</div>'
        +'<div style="font-size:10px;color:'+tc+'">'+(isAbs?'欠勤':isSun?'定休':slots.length?slots.length+'コマ':'')+'</div>'
        +(rCount?'<div style="font-size:10px;color:var(--bl)">'+rCount+'件</div>':'')
        +'</div>';
    }
    h+='</div>';
  }

  C.innerHTML=h;
}

function modalTSlot(id){
  const res=reservations.find(r=>r.id===id);if(!res)return;
  const d=pd(res.date);
  const slots=getTutorSlots(res.tutorId,res.date);const slot=slots[res.slotIdx];
  const lbl=`${d.getMonth()+1}/${d.getDate()}（${WD[d.getDay()]}） コマ${res.slotIdx+1} ${slot?slot.start+'〜'+slot.end:''}`;
  showModal(`<button class="mc" onclick="CM()">×</button>

    <div class="ir"><span class="ir-l">生徒番号</span><span class="ir-v" style="font-family:var(--mn)">${esc(res.studentId)}</span></div>

}

// ═══════════════════════════ TUTOR SCHEDULE EDITOR ═══════════════════════════

  const wt=sc.weeklyTemplate;

  let h=`
  <div class="card"><div class="ch"><h3>曜日ごとの基本コマ設定</h3><span style="font-size:12px;color:var(--tx2)">毎週の標準スケジュール</span></div>

      const slots=wt[dow]||[];

      return`<div class="sch-day">
        <div class="sch-day-head ${isWork?'work':'off'}" id="sdh-${dow}">${WD[dow]}曜日<br><span style="font-size:10px">${isWork?`${slots.length}コマ`:'休み'}</span></div>
        <div class="sch-day-body" id="sdb-${dow}">

function renderOverrideList(tid){

  return entries.map(([ds,slots])=>{

function addWeekSlot(dow){
  showModal(`<button class="mc" onclick="CM()">×</button>

      <div class="fg"><label>終了時刻</label><input type="time" id="ws-e" value="16:20" step="600"/></div>
    </div>
    <div class="fg"><label>コマ名（任意）</label><input type="text" id="ws-l" placeholder="コマ① など"/></div>
    <div class="err" id="ws-err"></div>
    <div class="ma">
      <button class="btn btn-gh" onclick="CM()">キャンセル</button>
      <button class="btn btn-dk" onclick="doAddWeekSlot(${dow})">追加</button>
    </div>`);
}
function doAddWeekSlot(dow){
  const s=document.getElementById('ws-s').value;
  const e=document.getElementById('ws-e').value;
  const l=document.getElementById('ws-l').value||`コマ${(schedules[CU.id].weeklyTemplate[dow]||[]).length+1}`;
  if(!s||!e){document.getElementById('ws-err').textContent='時刻を入力してください';return;}
  if(s>=e){document.getElementById('ws-err').textContent='終了時刻は開始より後にしてください';return;}
  const wt=schedules[CU.id].weeklyTemplate;
  if(!wt[dow])wt[dow]=[];
  wt[dow].push({start:s,end:e,label:l});
  wt[dow].sort((a,b)=>a.start.localeCompare(b.start));
  CM();pgTSch(document.getElementById('ct'));
}
function rmWeekSlot(dow,i){
  const wt=schedules[CU.id].weeklyTemplate;
  if(wt[dow])wt[dow].splice(i,1);
  if(wt[dow]&&wt[dow].length===0)wt[dow]=null;
  pgTSch(document.getElementById('ct'));
}

function doAddOverride(tid){
  const date=document.getElementById('ov-d').value;
  if(!date){document.getElementById('ov-err').textContent='日付を選んでください';return;}
  const type=document.getElementById('ov-type').value;
  if(type==='off'){
    schedules[tid].overrides[date]='off';
    CM();pgTSch(document.getElementById('ct'));return;
  }
  const rows=[...document.getElementById('ov-slot-list').children];
  const slots=rows.map(row=>{
    const inputs=row.querySelectorAll('input[type=time]');
    return{start:inputs[0].value,end:inputs[1].value,label:'コマ'};
  }).filter(sl=>sl.start&&sl.end&&sl.start<sl.end);
  if(!slots.length){document.getElementById('ov-err').textContent='有効なコマを1つ以上追加してください';return;}
  slots.sort((a,b)=>a.start.localeCompare(b.start));
  schedules[tid].overrides[date]=slots;
  CM();pgTSch(document.getElementById('ct'));
}
function rmOverride(tid,ds){
  delete schedules[tid].overrides[ds];
  pgTSch(document.getElementById('ct'));
}

}
function updateAbsenceDates(){
  const tid=document.getElementById('ab-tid').value;
  const sel=document.getElementById('ab-date');
  const dates=[];
  for(let i=0;i<=90;i++){
    const d=new Date();d.setDate(d.getDate()+i);
    if(d.getDay()===0)continue;
    const ds=ldate(d);
    const slots=getTutorSlots(tid,ds);
    if(slots.length>0)dates.push({ds,d});
  }
  sel.innerHTML=dates.length===0?'<option value="">シフトのある日がありません</option>':
    dates.map(({ds,d})=>`<option value="${ds}">${d.getMonth()+1}月${d.getDate()}日（${WD[d.getDay()]}）</option>`).join('');
}
function doAddAbsence(){
  const tid=document.getElementById('ab-tid').value;
  const date=document.getElementById('ab-date').value;
  const reason=document.getElementById('ab-reason').value.trim();
  if(!date){document.getElementById('ab-e').textContent='欠勤日を選んでください';return;}
  if(!reason){document.getElementById('ab-e').textContent='理由を入力してください';return;}
  if(tutorAbsences.find(a=>a.tutorId===tid&&a.date===date)){document.getElementById('ab-e').textContent='この日はすでに欠勤登録済みです';return;}
  processTutorAbsence(tid,date,reason);
  saveToStorage();CM();pgAllRes(document.getElementById('ct'));
}

function doEditTutor(tid){

function delTutor(tid){

function exportShiftJSON(){
  const data={exportedAt:new Date().toISOString(),schedules:{}};
  Object.entries(schedules).forEach(([tid,sc])=>{
    const t=tutors[tid];
    data.schedules[tid]={tutorName:t?t.name:'',weeklyTemplate:sc.weeklyTemplate,overrides:sc.overrides};
  });
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='shifts_export.json';a.click();
}
function importShiftModal(){
  showModal(`<button class="mc" onclick="CM()">×</button>
    <h3>シフトインポート</h3>
    <p class="ms">エクスポートしたJSONファイルを読み込みます</p>
    <div class="fg"><label>JSONファイル</label><input type="file" id="sh-f" accept=".json"/></div>
    <div style="font-size:12px;color:var(--am);background:var(--am-l);border:1px solid var(--am-b);border-radius:var(--r);padding:10px;margin-top:8px">
      ⚠️ 一致するIDの指導者のシフトが上書きされます。不明なIDはスキップされます。
    </div>
    <div class="err" id="sh-e"></div>
    <div class="ma">
      <button class="btn btn-gh" onclick="CM()">キャンセル</button>
      <button class="btn btn-dk" onclick="doImportShift()">インポート</button>
    </div>`);
}
function doImportShift(){
  const f=document.getElementById('sh-f').files[0];
  if(!f){document.getElementById('sh-e').textContent='ファイルを選択してください';return;}
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      if(!data.schedules){document.getElementById('sh-e').textContent='フォーマットが正しくありません';return;}
      let imported=0,skipped=0;
      Object.entries(data.schedules).forEach(([tid,sc])=>{
        if(tutors[tid]){schedules[tid]={weeklyTemplate:sc.weeklyTemplate||{},overrides:sc.overrides||{}};imported++;}
        else skipped++;
      });
      saveToStorage();CM();pgMgrSh(document.getElementById('ct'));
      setTimeout(()=>alert(`インポート完了：${imported}件更新、${skipped}件スキップ（未登録のID）`),100);
    }catch(err){document.getElementById('sh-e').textContent='JSONの解析に失敗しました: '+err.message;}
  };
  r.readAsText(f,'UTF-8');
}

// ═══════════════════════════ PRINT DATE RANGE ═══════════════════════════
function printDateRange(){
  const fromStr=document.getElementById('print-from').value;
  const toStr=document.getElementById('print-to').value;
  if(!fromStr||!toStr){alert('開始日と終了日を選択してください');return;}
  if(fromStr>toStr){alert('終了日は開始日以降にしてください');return;}
  const allDates=[];
  const cur=new Date(fromStr+'T00:00:00'),end=new Date(toStr+'T00:00:00');
  while(cur<=end){allDates.push(ldate(cur));cur.setDate(cur.getDate()+1);}
  if(allDates.length>31){alert('印刷期間は最大31日間です');return;}
  const fs=flatStudents();
  const tList=_shFilterTid?[tutors[_shFilterTid]].filter(Boolean):Object.values(tutors);
  const now=new Date();
  const printedAt=`${now.getFullYear()}/${z(now.getMonth()+1)}/${z(now.getDate())} ${z(now.getHours())}:${z(now.getMinutes())}`;
  let allPages='',firstPage=true;
  allDates.forEach(dateStr=>{
    const d=pd(dateStr);const dow=d.getDay();
    if(dow===0)return;
    const dateLabel=`${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${WD[dow]}）`;
    const tutorSlotData=tList.map(t=>({t,slots:getTutorSlots(t.id,dateStr)})).filter(({slots})=>slots.length>0);
    const pageBreak=firstPage?'':'page-break-before:always;';firstPage=false;
    if(!tutorSlotData.length){
      allPages+=`<div style="${pageBreak}font-family:'Noto Sans JP',sans-serif;padding:24px">
        <h1 style="font-size:20px;font-weight:700;border-bottom:2px solid #1a1a18;padding-bottom:8px;margin-bottom:16px">${esc(dateLabel)}　勤務者表</h1>
        <p style="color:#888">この日は勤務する指導者がいません。</p></div>`;return;
    }
    const maxSlots=Math.max(...tutorSlotData.map(({slots})=>slots.length));
    let hd=`<th style="border:1px solid #bbb;padding:8px 12px;background:#e8e8e6;white-space:nowrap">指導者</th>`;
    for(let i=0;i<maxSlots;i++)hd+=`<th style="border:1px solid #bbb;padding:8px 12px;background:#e8e8e6;min-width:110px">コマ${i+1}</th>`;
    const rows=tutorSlotData.map(({t,slots})=>{
      let cells=`<td style="border:1px solid #ddd;padding:8px 12px;font-weight:700;white-space:nowrap;background:#fafaf8">${esc(t.name)}</td>`;
      for(let i=0;i<maxSlots;i++){
        const slot=slots[i];
        if(!slot){cells+=`<td style="border:1px solid #ddd;padding:8px;text-align:center;color:#ccc;font-size:11px">—</td>`;continue;}
        const res=getRes(dateStr,i,t.id);const stu=res?fs[res.studentId]:null;
        const tstr=`<div style="font-size:10px;color:#888;margin-bottom:3px">${slot.start}〜${slot.end}</div>`;
        if(res&&stu)cells+=`<td style="border:1px solid #ddd;padding:8px 10px;vertical-align:top">${tstr}<strong style="font-size:13px">${esc(stu.name)}</strong><br><span style="font-size:11px;color:#2a5c45">📚 ${esc(res.subject)}</span></td>`;
        else if(res)cells+=`<td style="border:1px solid #ddd;padding:8px 10px;vertical-align:top">${tstr}<span style="font-size:12px;color:#666">${esc(res.studentId)} / ${esc(res.subject)}</span></td>`;
        else cells+=`<td style="border:1px solid #ddd;padding:8px 10px;vertical-align:top;background:#f9fff9">${tstr}<span style="font-size:12px;color:#aaa">（空き）</span></td>`;
      }
      return`<tr>${cells}</tr>`;
    }).join('');
    allPages+=`<div style="${pageBreak}font-family:'Noto Sans JP',sans-serif;padding:24px;max-width:960px">
      <h1 style="font-size:20px;font-weight:700;border-bottom:2px solid #1a1a18;padding-bottom:8px;margin-bottom:4px">${esc(dateLabel)}　勤務者表</h1>
      <p style="font-size:11px;color:#888;margin-bottom:16px">印刷日時：${printedAt}　指導予約システム</p>
      <table style="width:100%;border-collapse:collapse;font-size:13px"><thead><tr>${hd}</tr></thead><tbody>${rows}</tbody></table>
      <p style="font-size:10px;color:#bbb;margin-top:14px;border-top:1px solid #eee;padding-top:6px">（空き）=予約可 / 生徒名・科目=予約済 / —=コマなし</p>
    </div>`;
  });
  if(!allPages){alert('指定期間に勤務日がありません（日曜はスキップ）');return;}
  const pa=document.getElementById('print-area');
  pa.innerHTML=allPages;pa.style.display='block';
  window.print();
  setTimeout(()=>{pa.innerHTML='';pa.style.display='none';},500);
}

function adminDoAddWeekSlot(tid,dow){
  const s=document.getElementById('aws-s').value;
  const e=document.getElementById('aws-e').value;
  const l=document.getElementById('aws-l').value||`コマ${(schedules[tid].weeklyTemplate[dow]||[]).length+1}`;
  if(!s||!e){document.getElementById('aws-err').textContent='時刻を入力してください';return;}
  if(s>=e){document.getElementById('aws-err').textContent='終了時刻は開始より後にしてください';return;}
  const wt=schedules[tid].weeklyTemplate;
  if(!wt[dow])wt[dow]=[];
  wt[dow].push({start:s,end:e,label:l});
  wt[dow].sort((a,b)=>a.start.localeCompare(b.start));
  saveToStorage();adminEditSchModal(tid);
}
function adminRmWeekSlot(tid,dow,i){
  const wt=schedules[tid].weeklyTemplate;
  if(wt[dow])wt[dow].splice(i,1);
  if(wt[dow]&&wt[dow].length===0)wt[dow]=null;
  saveToStorage();adminEditSchModal(tid);
}

function doExportTutors(){
  const rows=[['ID','名前','在籍学年','指導科目（|区切り）','一言','パスワード']];
  Object.values(tutors).forEach(t=>{
    rows.push([t.id,t.name,t.grade||'',t.subjects.join('|'),t.bio||'',t.pw]);
  });
  const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='tutors_export.csv';a.click();
}

    <div class="err" id="tcsv-e"></div>
    <div class="ma">
      <button class="btn btn-gh" onclick="CM()">キャンセル</button>
      <button class="btn btn-dk" onclick="doImportTutors()">インポート</button>
    </div>`);
  document.getElementById('tcsv-f').addEventListener('change',e=>{
    const f=e.target.files[0];if(!f)return;

function doImportTutors(){
  const raw=document.getElementById('tcsv-t').value.trim();
  if(!raw){document.getElementById('tcsv-e').textContent='データを入力してください';return;}
  const lines=raw.split('\n').map(l=>l.trim()).filter(l=>l);
  let added=0,skipped=0;
  lines.forEach(line=>{
    const cols=line.split(',').map(c=>c.trim().replace(/^"|"$/g,''));
    if(cols.length<2)return;
    const [id,name,grade,subStr,bio,pw]=cols;
    if(!id||!name){skipped++;return;}
    if(id==='ID'){return;}
    if(tutors[id]||id===ADMIN.id){skipped++;return;}
    const subjects=subStr?subStr.split('|').map(s=>s.trim()).filter(s=>s):[];
    tutors[id]={id,name,pw:pw||'password',subjects,bio:bio||'',grade:grade||''};
    schedules[id]=defaultSchedule(id);
    added++;
  });
  saveToStorage();CM();pgMgrT(document.getElementById('ct'));
  setTimeout(()=>alert(`インポート完了：${added}件追加、${skipped}件スキップ\n※パスワード未設定の場合は初期値「password」が設定されます。`),100);
}

let _alTimer=null,_alActivity=null;
const AL_TIMEOUT=5*60*1000; // 5 minutes
function startAutoLogout(){
  stopAutoLogout();
  function reset(){
    clearTimeout(_alTimer);
    _alTimer=setTimeout(()=>{
      alert('5分間操作がなかったためログアウトしました。');
      doLogout();
    },AL_TIMEOUT);
  }
  _alActivity=reset;
  ['click','keydown','touchstart','scroll'].forEach(ev=>document.addEventListener(ev,_alActivity,{passive:true}));
  reset();
}
function stopAutoLogout(){
  clearTimeout(_alTimer);_alTimer=null;
  if(_alActivity){
    ['click','keydown','touchstart','scroll'].forEach(ev=>document.removeEventListener(ev,_alActivity));
    _alActivity=null;
  }
}

function _saveTpl(tplId){
  const name=document.getElementById('tpl-name').value.trim();
  if(!name){document.getElementById('tpl-err').textContent='テンプレート名を入力してください';return;}
  const rows=[...document.getElementById('tpl-slot-list').children];
  const slots=rows.map(row=>{
    const inputs=row.querySelectorAll('input[type=time]');
    const label=row.querySelector('input[type=text]').value.trim();
    return{start:inputs[0].value,end:inputs[1].value,label};
  }).filter(sl=>sl.start&&sl.end&&sl.start<sl.end);
  if(!slots.length){document.getElementById('tpl-err').textContent='有効なコマを1つ以上追加してください';return;}
  slots.sort((a,b)=>a.start.localeCompare(b.start));
  if(tplId){

function doBulkAssign(){

  const tpl=scheduleTemplates.find(t=>t.id===tplId);
  if(!tpl){alert('テンプレートが見つかりません');return;}
  const tids=[...document.querySelectorAll('.bulk-tutor-cb:checked')].map(c=>c.value);
  const dows=[...document.querySelectorAll('.bulk-dow-cb:checked')].map(c=>parseInt(c.value));
  if(!tids.length){alert('指導者を1名以上選択してください');return;}
  if(!dows.length){alert('曜日を1つ以上選択してください');return;}
  tids.forEach(tid=>{
    if(!schedules[tid])return;
    dows.forEach(dow=>{
      if(dow===0)return; // skip Sunday
      schedules[tid].weeklyTemplate[dow]=tpl.slots.map(sl=>({...sl}));
    });
  });
  saveToStorage();
  alert(`${tids.length}名 × ${dows.length}曜日にテンプレート「${tpl.name}」を適用しました`);
  pgMgrSh(document.getElementById('ct'));
}

// CSV Import/Export
function exportCSV(){
  const rows=[['学年','クラス','生徒番号','氏名']];
  Object.entries(studentDB).forEach(([grade,cls])=>
    Object.entries(cls).forEach(([cn,arr])=>
      arr.forEach(s=>rows.push([grade,cn,s.id,s.name]))));
  const csv=rows.map(r=>r.map(c=>`"${c}"`).join(',')).join('\n');
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='students.csv';a.click();
}
function mImportCSV(){
  showModal(`<button class="mc" onclick="CM()">×</button>
    <h3>CSVインポート</h3>
    <p class="ms">「学年,クラス,生徒番号,氏名」の形式でインポートします</p>
    <div style="font-size:12px;color:var(--tx2);background:var(--sf2);border-radius:var(--r);padding:10px;margin-bottom:12px;font-family:var(--mn)">
      ヘッダー行: 学年,クラス,生徒番号,氏名<br>
      例: 1年,Aクラス,s001,田中 花子
    </div>
    <div class="fg"><label>CSVファイル</label><input type="file" id="csv-f" accept=".csv"/></div>
    <div style="margin-top:8px;font-size:12px;color:var(--tx2)">または直接貼り付け：</div>
    <div class="fg" style="margin-top:6px"><textarea id="csv-t" rows="5" placeholder="1年,Aクラス,s031,昭和 太郎&#10;1年,Bクラス,s032,令和 花子"></textarea></div>
    <div class="err" id="csv-e"></div>
    <div class="ma">
      <button class="btn btn-gh" onclick="CM()">キャンセル</button>
      <button class="btn btn-dk" onclick="doImportCSV()">インポート</button>
    </div>`);
  document.getElementById('csv-f').addEventListener('change',e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();r.onload=ev=>{document.getElementById('csv-t').value=ev.target.result;};r.readAsText(f,'UTF-8');
  });
}
function doImportCSV(){
  const raw=document.getElementById('csv-t').value.trim();
  if(!raw){document.getElementById('csv-e').textContent='データを入力してください';return;}
  const lines=raw.split('\n').map(l=>l.trim()).filter(l=>l);
  let added=0,skipped=0;
  const fs=flatStudents();
  lines.forEach(line=>{
    const cols=line.split(',').map(c=>c.trim().replace(/^"|"$/g,''));
    if(cols.length<4)return;
    const [grade,cn,id,name]=cols;
    if(!grade||!cn||!id||!name){skipped++;return;}
    if(grade==='学年'){return;} // header row
    if(fs[id]){skipped++;return;}
    if(!studentDB[grade])studentDB[grade]={};
    if(!studentDB[grade][cn])studentDB[grade][cn]=[];
    const pw=cols[4]||id; // optional 5th column, default pw = ID
    studentDB[grade][cn].push({id,name,pw});
    fs[id]={id,name,pw};
    added++;
  });
  saveToStorage();CM();pgMgrStu(document.getElementById('ct'));
  setTimeout(()=>alert(`インポート完了：${added}件追加、${skipped}件スキップ`),100);
}

let _llF={role:'',uid:'',nm:'',gr:'',kl:'',df:'',dt:''};
let _llSort='loginAt';
let _llSortDir='desc';

function llSave(){
  _llF.role=document.getElementById('llf-role')?.value||'';
  _llF.uid=(document.getElementById('llf-uid')?.value||'').trim();
  _llF.nm=(document.getElementById('llf-nm')?.value||'').trim();
  _llF.gr=(document.getElementById('llf-gr')?.value||'').trim();
  _llF.kl=(document.getElementById('llf-kl')?.value||'').trim();
  _llF.df=document.getElementById('llf-df')?.value||'';
  _llF.dt=document.getElementById('llf-dt')?.value||'';
}
function llFiltered(){
  return loginLogs.filter(l=>{
    if(_llF.role&&l.role!==_llF.role)return false;
    if(_llF.uid&&!l.userId.toLowerCase().includes(_llF.uid.toLowerCase()))return false;
    if(_llF.nm&&!l.name.includes(_llF.nm))return false;
    if(_llF.gr&&!(l.grade||'').includes(_llF.gr))return false;
    if(_llF.kl&&!(l.klass||'').includes(_llF.kl))return false;
    if(_llF.df&&l.loginAt.slice(0,10)<_llF.df)return false;
    if(_llF.dt&&l.loginAt.slice(0,10)>_llF.dt)return false;
    return true;
  });
}
function llSorted(){
  const fl=llFiltered();
  return [...fl].sort((a,b)=>{
    const av=String(a[_llSort]||'');
    const bv=String(b[_llSort]||'');
    const r=av.localeCompare(bv,'ja');
    return _llSortDir==='asc'?r:-r;
  });
}

  if(_llSort===col){_llSortDir=_llSortDir==='asc'?'desc':'asc';}
  else{_llSort=col;_llSortDir=col==='loginAt'?'desc':'asc';}

  C.innerHTML=`
  <div class="card" style="margin-bottom:14px">
    <div class="ch"><h3>🔎 絞り込み</h3><span style="font-size:12px;color:var(--tx2)">各項目は部分一致・単独でも有効</span></div>
    <div class="cb">
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px;align-items:end">
        <div class="fg" style="margin:0"><label>ロール</label>
          <select id="llf-role">
            <option value="">全て</option>
            <option value="生徒" ${_llF.role==='生徒'?'selected':''}>生徒</option>
            <option value="指導者" ${_llF.role==='指導者'?'selected':''}>指導者</option>
            <option value="管理者" ${_llF.role==='管理者'?'selected':''}>管理者</option>
          </select>
        </div>
        <div class="fg" style="margin:0"><label>ユーザーID</label><input type="text" id="llf-uid" value="${esc(_llF.uid)}" placeholder="部分一致（大文字小文字不問）"/></div>
        <div class="fg" style="margin:0"><label>名前</label><input type="text" id="llf-nm" value="${esc(_llF.nm)}" placeholder="部分一致"/></div>
        <div class="fg" style="margin:0"><label>学年</label><input type="text" id="llf-gr" value="${esc(_llF.gr)}" placeholder="例: 1年"/></div>
        <div class="fg" style="margin:0"><label>クラス</label><input type="text" id="llf-kl" value="${esc(_llF.kl)}" placeholder="例: Aクラス"/></div>
        <div class="fg" style="margin:0">
          <label>開始日</label>
          <input type="date" id="llf-df" value="${_llF.df}" onchange="llSave();pgLL(document.getElementById('ct'))"/>
        </div>
        <div class="fg" style="margin:0">
          <label>終了日</label>
          <input type="date" id="llf-dt" value="${_llF.dt}" onchange="llSave();pgLL(document.getElementById('ct'))"/>
        </div>
        <div style="display:flex;gap:8px;align-items:flex-end">
          <button class="btn btn-gn" onclick="llSave();pgLL(document.getElementById('ct'))">絞り込む</button>
          <button class="btn btn-gh" onclick="_llF={role:'',uid:'',nm:'',gr:'',kl:'',df:'',dt:''};_llSort='loginAt';_llSortDir='desc';pgLL(document.getElementById('ct'))">リセット</button>
        </div>
      </div>
    </div>
  </div>
  <div class="card">
    <div class="ch">
      <h3>ログイン履歴（${fl.length} / ${loginLogs.length} 件）</h3>
      <button class="btn btn-gh btn-sm" onclick="exportLL()">📥 CSVエクスポート</button>
    </div>
    <div style="overflow-x:auto;-webkit-overflow-scrolling:touch"><table class="tbl"><thead><tr>
      <th onclick="llSetSort('loginAt')" style="cursor:pointer;white-space:nowrap">日時 ${llSortIcon('loginAt')}</th>
      <th onclick="llSetSort('userId')" style="cursor:pointer;white-space:nowrap">ユーザーID ${llSortIcon('userId')}</th>
      <th onclick="llSetSort('name')" style="cursor:pointer;white-space:nowrap">名前 ${llSortIcon('name')}</th>
      <th onclick="llSetSort('grade')" style="cursor:pointer;white-space:nowrap">学年 ${llSortIcon('grade')}</th>
      <th onclick="llSetSort('klass')" style="cursor:pointer;white-space:nowrap">クラス ${llSortIcon('klass')}</th>
      <th onclick="llSetSort('role')" style="cursor:pointer;white-space:nowrap">ロール ${llSortIcon('role')}</th>
    </tr></thead>
    <tbody>${fl.length===0?`<tr><td colspan="6" style="text-align:center;color:var(--tx2);padding:20px">該当なし</td></tr>`:
    fl.map(l=>{
      const d=new Date(l.loginAt);
      const dateStr=`${d.getFullYear()}/${z(d.getMonth()+1)}/${z(d.getDate())}（${WD[d.getDay()]}）`;
      const timeStr=`${z(d.getHours())}:${z(d.getMinutes())}`;
      return`<tr>
        <td style="font-family:var(--mn);font-size:12px;white-space:nowrap">${dateStr} ${timeStr}</td>
        <td style="font-family:var(--mn)">${esc(l.userId)}</td>
        <td>${esc(l.name)}</td>
        <td style="font-size:12px">${esc(l.grade||'—')}</td>
        <td style="font-size:12px">${esc(l.klass||'—')}</td>
        <td><span class="bx ${l.role==='管理者'?'bx-rd':l.role==='指導者'?'bx-gn':'bx-gy'}">${l.role}</span></td>
      </tr>`;
    }).join('')}
    </tbody></table></div>
  </div>`;
}
function exportLL(){
  const fl=llSorted();
  const rows=[['日時','曜日','ユーザーID','名前','学年','クラス','ロール']];
  fl.forEach(l=>{
    const d=new Date(l.loginAt);
    rows.push([fdt(l.loginAt),WD[d.getDay()],l.userId,l.name,l.grade||'',l.klass||'',l.role]);
  });
  const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`login_history_${today()}.csv`;a.click();
}

  document.getElementById('sb').classList.toggle('sb-open');
  document.getElementById('sb-overlay').classList.toggle('sb-open');
}
function closeSB(){
  document.getElementById('sb').classList.remove('sb-open');
  document.getElementById('sb-overlay').classList.remove('sb-open');
}

loadFromStorage();
